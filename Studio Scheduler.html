// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// SCHEDULE SANITIZER — strips conflicting sessions before display
// ═══════════════════════════════════════════════════════
function sanitizeSchedule(rawSchedule) {
  const toMins = t => { const [h,m]=(t||'00:00').split(':').map(Number); return h*60+(m||0); };
  const overlaps = (a,b) => toMins(a.time_start)<toMins(b.time_end) && toMins(b.time_start)<toMins(a.time_end);
  const weekdays = new Set(['Monday','Tuesday','Wednesday','Thursday','Friday']);
  const schoolStart = S.schedParams.schoolDayStart || '16:45';

  const removed = [];

  // Flatten all sessions with day/date context, track which day they came from
  const allSessions = rawSchedule.flatMap((day, dayIdx) =>
    (day.sessions||[]).map((s, sIdx) => ({...s, _day:day.day, _date:day.date||day.day, _dayIdx:dayIdx, _sIdx:sIdx, _keep:true}))
  );

  // Mark sessions that violate hard rules — first violation found removes the later session
  // Process in time order so earlier sessions take precedence
  const sorted = [...allSessions].sort((a,b) => toMins(a.time_start)-toMins(b.time_start));

  const roomUsed   = {}; // key: date|room|time_start → session
  const instrUsed  = {}; // key: date|instructor|time_start → session

  sorted.forEach(s => {
    const dateKey = s._date;

    // ── Room double-booking — soft warning only, don't strip ────────────────
    // (acceptable when instructor/room assignments are not yet set)

    // ── Instructor double-booking — HARD ────────────────────────────────────
    if (s.instructor && s.instructor !== 'TBD') {
      const instrList = s.instructor.split('/').map(x=>x.trim());
      for (const instr of instrList) {
        const conflicts = sorted.filter(o =>
          o !== s && o._keep && o._date === dateKey &&
          o.instructor && o.instructor.split('/').map(x=>x.trim()).includes(instr) &&
          overlaps(s, o)
        );
        if (conflicts.length) {
          s._keep = false;
          removed.push({group:s.group, date:s._date, time:`${s.time_start}–${s.time_end}`, reason:`Instructor "${instr}" already teaching "${conflicts[0].group}" at that time`});
          break;
        }
      }
      if (!s._keep) return;
    }

    // ── Blocked time overlap ─────────────────────────────────────────────────
    for (const block of S.blockedTimes) {
      if (s._day !== block.day) continue;
      if (!overlaps(s, {time_start:block.timeStart, time_end:block.timeEnd})) continue;

      let applies = false;

      if (block.appliesGroups.length && block.appliesGroups.includes(s.group)) {
        // Explicit group match
        applies = true;
      } else if (!block.appliesSL.length && !block.appliesGroups.length) {
        // No restrictions = applies to everyone
        applies = true;
      } else if (block.appliesSL.length) {
        // Per-dancer level check: does any dancer in this rehearsal group
        // have an individual level that puts them in this class?
        const groupDancers = S.dancers.filter(d => d.groups.includes(s.group));
        applies = groupDancers.some(d =>
          block.appliesSL.some(sl =>
            sl === d.affect_level ||
            sl === d.prepro_level ||
            sl === d.pointe_level ||
            sl === d.tap_level    ||
            (d.all_levels||'').split('|').map(x=>x.trim()).includes(sl)
          )
        );
      }

      if (applies) {
        s._keep = false;
        removed.push({group:s.group, date:s._date, time:`${s.time_start}–${s.time_end}`, reason:`Overlaps standing class "${block.label}" (${block.day} ${block.timeStart}–${block.timeEnd})`});
        return;
      }
    }

    // ── Dancer overlap — HARD, always enforced ───────────────────────────────
    const groupDancers = S.dancers.filter(d=>d.groups.includes(s.group));
    const multiDancers = groupDancers.filter(d=>(d.group_count||d.groups.length)>1);
    for (const dancer of multiDancers) {
      const otherGroupSessions = sorted.filter(o =>
        o !== s && o._keep && o._date === dateKey &&
        dancer.groups.includes(o.group) && overlaps(s, o)
      );
      if (otherGroupSessions.length) {
        s._keep = false;
        removed.push({group:s.group, date:s._date, time:`${s.time_start}–${s.time_end}`, reason:`Dancer "${dancer.name}" is in both this group and "${otherGroupSessions[0].group}" at the same time`});
        return;
      }
    }

    // ── School hours — per-dancer dismissal time aware ───────────────────────
    if (weekdays.has(s._day) && s.time_start) {
      const sessionDancers = S.dancers.filter(d => d.groups.includes(s.group));
      // Find the latest effective dismissal across all dancers for this specific day
      let latestDismissal = toMins(schoolStart);
      sessionDancers.forEach(d => {
        const override = (d.dismissalOverrides || []).find(o => o.day === s._day);
        if (override) {
          if (override.offSchool) { return; }
          if (override.time) { latestDismissal = Math.max(latestDismissal, toMins(override.time)); return; }
        }
        if (d.schoolLevel && S.schoolDismissalTimes[d.schoolLevel]) {
          latestDismissal = Math.max(latestDismissal, toMins(S.schoolDismissalTimes[d.schoolLevel]));
        }
      });
      if (toMins(s.time_start) < latestDismissal) {
        const fmt = m => String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
        s._keep = false;
        removed.push({group:s.group, date:s._date, time:`${s.time_start}–${s.time_end}`, reason:`Starts before latest dancer dismissal (${fmt(latestDismissal)}) on ${s._day}`});
        return;
      }
    }
  });

  // Rebuild schedule with only kept sessions
  const cleanSchedule = rawSchedule.map(day => ({
    ...day,
    sessions: (day.sessions||[]).filter(s => {
      const match = allSessions.find(a => a._dayIdx === rawSchedule.indexOf(day) && a.group===s.group && a.time_start===s.time_start);
      return match ? match._keep : true;
    })
  })).filter(day => (day.sessions||[]).length > 0);

  return { cleanSchedule, removed };
}

// ═══════════════════════════════════════════════════════
// LOCAL VALIDATOR
// ═══════════════════════════════════════════════════════
function validateSchedule(sched) {
  const errors = [], warnings = [];
  const allSessions = (sched.schedule||[]).flatMap(day =>
    (day.sessions||[]).map(s=>({...s, day:day.day, date:day.date}))
  );

  const toMins = t => { const [h,m]=(t||'00:00').split(':').map(Number); return h*60+(m||0); };
  const overlaps = (aS,aE,bS,bE) => toMins(aS)<toMins(bE) && toMins(bS)<toMins(aE);
  const sessOverlaps = (s1,s2) => overlaps(s1.time_start,s1.time_end,s2.time_start,s2.time_end);
  const sameDay = (s1,s2) => (s1.date||s1.day)===(s2.date||s2.day) || (s1.date===s2.date && s1.day===s2.day);

  // ── Room double-booking ──────────────────────────────────────────────────
  const byRoom = {};
  allSessions.forEach(s=>{
    const k=(s.date||s.day)+'|'+s.room;
    (byRoom[k]=byRoom[k]||[]).push(s);
  });
  Object.values(byRoom).forEach(sessions=>{
    for(let i=0;i<sessions.length;i++) for(let j=i+1;j<sessions.length;j++){
      if(sessOverlaps(sessions[i],sessions[j]))
        errors.push(`Room double-booked: "${sessions[i].room}" on ${sessions[i].date||sessions[i].day} — ${sessions[i].group} (${sessions[i].time_start}–${sessions[i].time_end}) clashes with ${sessions[j].group} (${sessions[j].time_start}–${sessions[j].time_end})`);
    }
  });

  // ── Instructor double-booking (rehearsal vs rehearsal) ───────────────────
  const byInstr = {};
  allSessions.forEach(s=>{
    const k=(s.date||s.day)+'|'+s.instructor;
    (byInstr[k]=byInstr[k]||[]).push(s);
  });
  Object.values(byInstr).forEach(sessions=>{
    for(let i=0;i<sessions.length;i++) for(let j=i+1;j<sessions.length;j++){
      if(sessOverlaps(sessions[i],sessions[j]))
        errors.push(`Instructor double-booked: ${sessions[i].instructor} on ${sessions[i].date||sessions[i].day} — ${sessions[i].group} (${sessions[i].time_start}–${sessions[i].time_end}) clashes with ${sessions[j].group} (${sessions[j].time_start}–${sessions[j].time_end})`);
    }
  });

  // ── Room capacity ────────────────────────────────────────────────────────
  allSessions.forEach(s=>{
    const room = S.rooms.find(r=>r.name===s.room);
    if(room && s.dancer_count > room.maxOcc)
      errors.push(`Capacity exceeded: ${s.group} has ${s.dancer_count} dancers in "${s.room}" (max ${room.maxOcc}) on ${s.date||s.day}`);
  });

  // ── Room style compatibility ─────────────────────────────────────────────
  allSessions.forEach(s=>{
    const room = S.rooms.find(r=>r.name===s.room);
    if(room && s.style && !room.styles.includes(s.style))
      errors.push(`Room style mismatch: "${s.room}" does not allow ${s.style} — assigned to ${s.group} on ${s.date||s.day}`);
  });

  // ── Instructor style compatibility ───────────────────────────────────────
  allSessions.forEach(s=>{
    const instr = S.instructors.find(i=>i.name===s.instructor);
    if(instr && s.style && !instr.styles.includes(s.style))
      errors.push(`Instructor style mismatch: ${s.instructor} cannot teach ${s.style} — assigned to ${s.group} on ${s.date||s.day}`);
  });

  // ── Locked group styles ──────────────────────────────────────────────────
  allSessions.forEach(s=>{
    const grp = S.groups.find(gr=>gr.name===s.group);
    if(grp && s.style && !grp.styles.includes(s.style))
      errors.push(`Group style violation: ${s.group} is locked to [${grp.styles.join(', ')}] but scheduled for ${s.style} on ${s.date||s.day}`);
  });

  // ── Multi-group dancer overlap (rehearsal vs rehearsal) ──────────────────
  S.dancers.filter(d=>(d.group_count||d.groups.length)>=2).forEach(dancer=>{
    const their = allSessions.filter(s=>dancer.groups.includes(s.group));
    for(let i=0;i<their.length;i++) for(let j=i+1;j<their.length;j++){
      if(sameDay(their[i],their[j]) && sessOverlaps(their[i],their[j]))
        errors.push(`Dancer conflict: ${dancer.name} is in both "${their[i].group}" and "${their[j].group}" on ${their[i].date||their[i].day} at ${their[i].time_start}–${their[i].time_end}`);
    }
  });

  // Under-12 curfew — disabled per studio config
  // allSessions.forEach(s=>{ ... });

  // ── Blocked time: student overlap ────────────────────────────────────────
  // A rehearsal session whose dancers attend a standing class cannot overlap that class
  S.blockedTimes.forEach(block=>{
    allSessions.forEach(s=>{
      if(s.day!==block.day) return;
      if(!overlaps(s.time_start,s.time_end,block.timeStart,block.timeEnd)) return;

      // Check if any students in this session are affected by this block
      const sessionMembers = S.dancers.filter(d=>d.groups.includes(s.group));
      const affectedStudents = sessionMembers.filter(d=>{
        if(block.appliesGroups.length && block.appliesGroups.includes(s.group)) return true;
        if(!block.appliesSL.length && !block.appliesGroups.length) return true;
        if(block.appliesSL.length) return block.appliesSL.some(sl=>
          sl===d.affect_level || sl===d.prepro_level ||
          sl===d.pointe_level || sl===d.tap_level    ||
          (d.all_levels||'').split('|').map(x=>x.trim()).includes(sl)
        );
        return false;
      });

      if(affectedStudents.length>0)
        errors.push(`Student conflict: ${affectedStudents.length} dancer(s) in "${s.group}" on ${s.date||s.day} at ${s.time_start}–${s.time_end} overlap standing class "${block.label}" (${block.day} ${block.timeStart}–${block.timeEnd}). Affected: ${affectedStudents.slice(0,3).map(d=>d.name).join(', ')}${affectedStudents.length>3?' +'+( affectedStudents.length-3)+' more':''}`);
    });
  });

  // ── Blocked time: instructor overlap ────────────────────────────────────
  // An instructor assigned to a standing class cannot also teach a rehearsal session at the same time
  S.blockedTimes.filter(b=>b.assignedInstructor).forEach(block=>{
    allSessions.forEach(s=>{
      if(s.day!==block.day) return;
      if(s.instructor!==block.assignedInstructor) return;
      if(!overlaps(s.time_start,s.time_end,block.timeStart,block.timeEnd)) return;
      errors.push(`Instructor conflict: ${block.assignedInstructor} is teaching standing class "${block.label}" (${block.day} ${block.timeStart}–${block.timeEnd}) but is also assigned to rehearse "${s.group}" on ${s.date||s.day} at ${s.time_start}–${s.time_end}`);
    });
  });

  // Instructor break check — disabled (instructors work back-to-back)

  // ── Sibling window (soft) — schedule siblings within 30 min of each other ──
  const sibGroups2 = {};
  S.dancers.filter(d=>d.sibGroup).forEach(d=>{
    (sibGroups2[d.sibGroup]=sibGroups2[d.sibGroup]||[]).push(d);
  });
  Object.entries(sibGroups2).forEach(([sibGroup,siblings])=>{
    for(let i=0;i<siblings.length;i++) for(let j=i+1;j<siblings.length;j++){
      const s1=allSessions.filter(s=>siblings[i].groups.includes(s.group));
      const s2=allSessions.filter(s=>siblings[j].groups.includes(s.group));
      s1.forEach(a=>s2.forEach(b=>{
        if(!sameDay(a,b)) return;
        const endA=toMins(a.time_end), endB=toMins(b.time_end);
        const gap=Math.abs(endA-endB);
        if(gap>30) warnings.push(`Sibling window: ${siblings[i].name} & ${siblings[j].name} end sessions ${gap} min apart on ${a.date||a.day} (target: within 30 min)`);
      }));
    }
  });

  // School hours check is handled in the AI prompt — not repeated here

  // ── Rehearsal count vs target ────────────────────────────────────────────
  // Check how many sessions each group got vs its targetReh
  const rehCounts = {};
  allSessions.forEach(s=>{ rehCounts[s.group]=(rehCounts[s.group]||0)+1; });
  S.groups.forEach(gr=>{
    const got = rehCounts[gr.name]||0;
    const target = gr.targetReh||gr.minReh||0;
    const min = gr.minReh||0;
    if(got < min)
      errors.push(`Rehearsal shortfall: "${gr.name}" needs at least ${min} sessions but only has ${got} scheduled`);
    else if(got < target)
      warnings.push(`Below target: "${gr.name}" has ${got} of ${target} target rehearsals scheduled`);
    else if(got > (gr.maxReh||target+4))
      warnings.push(`Over maximum: "${gr.name}" has ${got} sessions but max is ${gr.maxReh||'unset'}`);
  });

  // ── Max 1hr gap between consecutive sessions for same dancer (soft) ────────
  const dancerSessionsByDay = {};
  S.dancers.filter(d=>d.is_competing!=='N').forEach(d=>{
    allSessions.filter(s=>d.groups.includes(s.group)).forEach(s=>{
      const key = d.id+'|'+(s.date||s.day);
      (dancerSessionsByDay[key]=dancerSessionsByDay[key]||{dancer:d,sessions:[]}).sessions.push(s);
    });
  });
  Object.values(dancerSessionsByDay).forEach(({dancer:d,sessions:ds})=>{
    if(ds.length<2) return;
    const sorted=[...ds].sort((a,b)=>toMins(a.time_start)-toMins(b.time_start));
    for(let i=0;i<sorted.length-1;i++){
      const gap=toMins(sorted[i+1].time_start)-toMins(sorted[i].time_end);
      if(gap>60) warnings.push(`Long wait: ${d.name} has ${gap} min gap between "${sorted[i].group}" (ends ${sorted[i].time_end}) and "${sorted[i+1].group}" (starts ${sorted[i+1].time_start}) on ${sorted[i].date||sorted[i].day}`);
    }
  });

  return {errors, warnings};
}

// JSON EXTRACTION
// ═══════════════════════════════════════════════════════
function extractJSON(raw) {
  // Strip markdown fences
  let text = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '').trim();

  // Helper: is this a valid schedule-like object?
  const isValid = r => r && (r.sessions || r.schedule || Array.isArray(r));

  // Strategy 1: clean full parse
  try { const r=JSON.parse(text); if(isValid(r)) return r; } catch {}

  // Strategy 2: bracket-counting — find real end of outermost { }
  const start = text.indexOf('{');
  if (start !== -1) {
    let depth=0, inStr=false, esc=false;
    for (let i=start; i<text.length; i++) {
      const c=text[i];
      if (esc) { esc=false; continue; }
      if (c==='\\') { esc=true; continue; }
      if (c==='"') { inStr=!inStr; continue; }
      if (inStr) continue;
      if (c==='{') depth++;
      else if (c==='}') { depth--; if(depth===0){ try { const r=JSON.parse(text.slice(start,i+1)); if(isValid(r)) return r; } catch {} break; } }
    }
  }

  // Strategy 3: extract sessions array directly
  const sessM = raw.match(/"sessions"\s*:\s*(\[[\s\S]*?\])/);
  if (sessM) { try { const s=JSON.parse(sessM[1]); if(Array.isArray(s)) return {sessions:s}; } catch {} }

  // Strategy 4: extract schedule array
  const schedM = raw.match(/"schedule"\s*:\s*(\[[\s\S]*?\])/);
  if (schedM) { try { const s=JSON.parse(schedM[1]); return {schedule:s}; } catch {} }

  // Strategy 5: SALVAGE — extract complete session objects
  const days = [];
  const dayRe = /\{\s*"day"\s*:[\s\S]*?"sessions"\s*:\s*\[[\s\S]*?\]\s*\}/g;
  let m;
  while ((m = dayRe.exec(raw)) !== null) {
    try { days.push(JSON.parse(m[0])); } catch {}
  }
  if (days.length > 0) return { schedule: days };

  // Strategy 6: extract individual session objects and wrap
  const sessions = [];
  const sessRe = /\{[^{}]*"time_start"[^{}]*"time_end"[^{}]*"group"[^{}]*\}/g;
  let sm;
  while ((sm = sessRe.exec(raw)) !== null) {
    try { sessions.push(JSON.parse(sm[0])); } catch {}
  }
  if (sessions.length > 0) return { sessions };

  return null;
}

// AI GENERATION
// ═══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════════
// LOCAL CONSTRAINT SOLVER — replaces AI for slot assignment
// ══════════════════════════════════════════════════════════════════════════════

function buildConflictMap(groups, dancers) {
  // Returns map: groupId -> Set of groupIds that share at least one dancer
  const map = {};
  groups.forEach(g => { map[g] = new Set(); });
  dancers.forEach(d => {
    const dGroups = d.groups.filter(g => groups.includes(g));
    if(dGroups.length < 2) return;
    for(let i = 0; i < dGroups.length; i++)
      for(let j = i+1; j < dGroups.length; j++) {
        map[dGroups[i]]?.add(dGroups[j]);
        map[dGroups[j]]?.add(dGroups[i]);
      }
  });
  return map;
}

function timeToMins(t) {
  if(!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h*60+(m||0);
}
function minsToTime(m) {
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
}

function solveDay(date, dayName, groupsToPlace, groupData, rooms, blockedTimes, dancers, weekNum) {
  // Pure JS bin-packing with backtracking
  // Returns {sessions:[], unplaced:[]}

  const OPEN  = timeToMins(
    dayName==='Saturday' ? '09:00' :
    dayName==='Sunday'   ? '10:00' :  // Sunday floor — all groups start no earlier than 10am
    dayName==='Friday' ? '15:00' : '15:00'
  );
  // Hard starts on Sunday: CAN not before 12:00, AFF not before 11:00, all others not before 10:00 (OPEN)
  const AFF_SUNDAY_START  = timeToMins('11:00');
  const CAN_SUNDAY_START  = timeToMins('12:00');

  const isWeekday = !['Saturday','Sunday'].includes(dayName);
  // Global school dismissal floor for weekdays
  const SCHOOL_OPEN = isWeekday ? timeToMins(S.schedParams.schoolDayStart || '16:45') : 0;

  // Returns the effective earliest start time for a dancer on this day
  function getDancerDismissal(d) {
    if (!isWeekday) return 0;
    // 1. Day-specific override
    const override = (d.dismissalOverrides || []).find(o => o.day === dayName);
    if (override) {
      if (override.offSchool) return 0;
      if (override.time) return timeToMins(override.time);
    }
    // 2. School level dismissal time
    if (d.schoolLevel && S.schoolDismissalTimes[d.schoolLevel]) {
      return timeToMins(S.schoolDismissalTimes[d.schoolLevel]);
    }
    // 3. Global fallback
    return SCHOOL_OPEN;
  }

  function groupOpen(gd) {
    if(dayName === 'Sunday') {
      if(gd.group.startsWith('CAN')) return CAN_SUNDAY_START;
      if(gd.group.startsWith('AFF-') || gd.group.startsWith('AFF-PREP')) return AFF_SUNDAY_START;
    }
    if(isWeekday) {
      // Find the latest dismissal time among dancers in this group
      const groupDancers = dancers.filter(d => d.groups && d.groups.includes(gd.group));
      let latestDismissal = SCHOOL_OPEN;
      groupDancers.forEach(d => {
        latestDismissal = Math.max(latestDismissal, getDancerDismissal(d));
      });
      return Math.max(OPEN, latestDismissal);
    }
    return OPEN;
  }
  const CLOSE = timeToMins('21:45');
  const conflictMap = buildConflictMap(groupsToPlace.map(g=>g.group), dancers);

  // ── Load instructor-room bans from S.constraints ────────────────────────────
  const instrRoomBans = (S.constraints||[]).filter(c=>c.type==='instr_room_ban');

  // Style-to-room constants (computed once per day, not per minute)
  const STYLE_ROOM_RULES = [
    { rooms: ['Slyde'], requiredStyles: ['Tap'] },
    { rooms: ['Fosse'], excludedStyles: ['Ballet','Pointe'] },
  ];
  const TAP_ROOMS_ORDERED = ['Slyde', 'Fosse'];

  // Pre-compute blocked windows for this day
  const dayBlocked = blockedTimes
    .filter(b => b.day === dayName)
    .map(b => ({ start: timeToMins(b.timeStart), end: timeToMins(b.timeEnd), label: b.label }));

  // Each room has a timeline: array of {start, end, group}
  const roomTimelines = {};
  rooms.forEach(r => { roomTimelines[r.name] = []; });
  const roomList = rooms.map(r => r.name);

  // Track placed groups for conflict checking
  const placed = {}; // group -> {start, end, room}
  const sessions = [];
  const unplaced = [];

  // Sort: competition groups first (by conflict count), fill-ins last (by session length, shortest last)
  const sortedGroups = [...groupsToPlace].sort((a,b) => {
    // Fill-ins always after competition groups
    const aFill = a._fillIn ? 1 : 0;
    const bFill = b._fillIn ? 1 : 0;
    if(aFill !== bFill) return aFill - bFill;
    if(aFill && bFill) return b.sessLenMin - a.sessLenMin; // longer fill-ins first
    // Competition: Sunday CAN first, then by conflict count
    if(dayName === 'Sunday') {
      const aIsCAN = a.group.startsWith('CAN') ? 0 : 1;
      const bIsCAN = b.group.startsWith('CAN') ? 0 : 1;
      if(aIsCAN !== bIsCAN) return aIsCAN - bIsCAN;
    }
    return (conflictMap[b.group]?.size||0) - (conflictMap[a.group]?.size||0);
  });

  function isBlockedTime(start, end) {
    return dayBlocked.some(b => start < b.end && b.start < end);
  }

  function roomFreeAt(roomName, start, end) {
    return !roomTimelines[roomName].some(s => start < s.end && s.start < end);
  }

  function conflictsWithPlaced(group, start, end) {
    const conflicts = conflictMap[group] || new Set();
    for(const other of conflicts) {
      if(!placed[other]) continue;
      const o = placed[other];
      if(start < o.end && o.start < end) return other;
    }
    return null;
  }

  // Try to place a group — iterate over every possible start time and room
  function instrFreeAt(instrName, start, end) {
    if(!instrName || instrName==='TBD' || instrName==='any') return true;
    const instructors = instrName.split('/').map(x=>x.trim());
    for (const instr of instructors) {
      const busy = sessions.some(s =>
        s.instructor && s.instructor.split('/').map(x=>x.trim()).includes(instr) &&
        start < timeToMins(s.time_end) && timeToMins(s.time_start) < end
      );
      if (busy) return false;
    }
    return true;
  }

  function tryPlace(gd) {
    const len = gd.sessLenMin;
    const windowStart = gd.assignedTimeStart ? timeToMins(gd.assignedTimeStart) : groupOpen(gd);
    const windowEnd   = gd.assignedTimeEnd   ? timeToMins(gd.assignedTimeEnd)   : CLOSE;
    // assignedTimeStart overrides the day floor entirely — allows a group to start before 10am on Sunday
    const groupStart  = gd.assignedTimeStart ? windowStart : Math.max(groupOpen(gd), windowStart);

    const groupStyles = gd.styles || [];
    const isTapGroup  = groupStyles.includes('Tap');
    const count       = gd.memberCount || 0;

    // ── Build allowed room list (style rules + bans) — computed once ──────────
    let allowedRooms;
    if(isTapGroup) {
      allowedRooms = TAP_ROOMS_ORDERED.filter(r => roomList.includes(r));
      if(!allowedRooms.length) allowedRooms = [...roomList];
    } else {
      allowedRooms = roomList.filter(r => r !== 'Slyde');
      STYLE_ROOM_RULES.filter(rule => rule.excludedStyles).forEach(rule => {
        const isExcluded = rule.excludedStyles.some(s => groupStyles.includes(s));
        if(isExcluded) allowedRooms = allowedRooms.filter(r => !rule.rooms.includes(r));
      });
      if(!allowedRooms.length) allowedRooms = roomList.filter(r => r !== 'Slyde');
    }

    // Instructor-room bans
    const groupInstrs = [gd.assignedInstructor, gd.assignedInstructor2].filter(x=>x&&x!=='TBD');
    if(groupInstrs.length) {
      const bannedRooms = new Set(
        instrRoomBans
          .filter(b => groupInstrs.some(i => i.toLowerCase() === b.instructor.toLowerCase()))
          .map(b => b.room)
      );
      if(bannedRooms.size) {
        const filtered = allowedRooms.filter(r => !bannedRooms.has(r));
        if(filtered.length) allowedRooms = filtered;
      }
    }

    // Large groups (13+): hard-gate to large rooms only
    if(count > 12 && !isTapGroup) {
      const largeOnly = allowedRooms.filter(r => (rooms.find(x=>x.name===r)?.maxOcc||0) >= 40);
      if(largeOnly.length) allowedRooms = largeOnly;
    }

    // Ballet hard rule:
    // Competition/performance Ballet groups (non-SDT) → large rooms only (cap ≥40)
    // Variation/SDT Ballet groups → just avoid Fosse and Slyde (no size gate needed)
    const isBalletGroup = groupStyles.includes('Ballet');
    const isSoloDuoTrio = (gd.category || '') === 'solo_duo_trio';
    const isVariation   = (gd.category || '') === 'variation';
    if(isBalletGroup && !isTapGroup) {
      if(!isSoloDuoTrio && !isVariation) {
        // Hard gate to large rooms
        const largeOnly = allowedRooms.filter(r => (rooms.find(x=>x.name===r)?.maxOcc||0) >= 40);
        if(largeOnly.length) allowedRooms = largeOnly;
      } else {
        // Soft rule: just exclude Fosse and Slyde — Ballet needs floor space, not a specific size
        const noFosseSlyde = allowedRooms.filter(r => r !== 'Fosse' && r !== 'Slyde');
        if(noFosseSlyde.length) allowedRooms = noFosseSlyde;
      }
    }

    // ── Room preference sort ──────────────────────────────────────────────────
    const ROOM_PRIORITY = ['Balanchine','Ailey','Tallchief','Fosse','Graham','DeMille'];
    const roomPriIdx = r => { const i = ROOM_PRIORITY.indexOf(r); return i === -1 ? 99 : i; };

    // How many minutes are already booked in this room today
    const roomLoad = r => (roomTimelines[r]||[]).reduce((sum,s) => sum + (s.end - s.start), 0);

    const roomScore = r => {
      const cap = rooms.find(x=>x.name===r)?.maxOcc || 25;
      const isLargeRoom = cap >= 40;
      // New thresholds: small ≤5, medium 6–12, large 13+
      let tier;
      if(count > 12)     tier = isLargeRoom ? 0 : cap >= 20 ? 1 : 2;       // large groups → big three first
      else if(count > 5) tier = cap >= 20 && !isLargeRoom ? 0 : isLargeRoom ? 1 : 2; // medium groups → DeMille/Graham/Fosse first
      else               tier = cap >= 20 && !isLargeRoom ? 0 : cap < 20  ? 1 : 2;  // small groups → medium rooms first
      const assigned = r === gd.assignedRoom ? 0 : 1;
      // Within the big three (tier 0 for large/ballet groups): spread load evenly
      // Use current booking minutes as tiebreaker so Balanchine doesn't hog all sessions
      const load = (tier === 0 && isLargeRoom) ? roomLoad(r) : 0;
      return tier * 100000 + assigned * 10000 + load * 10 + roomPriIdx(r);
    };

    // Whether this group is hard-gated to the big three (used for in-loop re-sort)
    // isVariation already declared above in the Ballet rule block
    const isLargeRoomGroup = (count > 12 || (groupStyles.includes('Ballet') && (gd.category||'') !== 'solo_duo_trio' && !isVariation)) && !isTapGroup;

    // Base room order (non-load factors) — computed once
    const baseRoomScore = r => {
      const cap = rooms.find(x=>x.name===r)?.maxOcc || 25;
      const isLargeRoom = cap >= 40;
      let tier;
      if(count > 12)     tier = isLargeRoom ? 0 : cap >= 20 ? 1 : 2;
      else if(count > 5) tier = cap >= 20 && !isLargeRoom ? 0 : isLargeRoom ? 1 : 2;
      else               tier = cap >= 20 && !isLargeRoom ? 0 : cap < 20  ? 1 : 2;
      const assigned = r === gd.assignedRoom ? 0 : 1;
      return tier * 10000 + assigned * 1000 + (ROOM_PRIORITY.indexOf(r) === -1 ? 99 : ROOM_PRIORITY.indexOf(r));
    };

    // For non-big-three-gated groups, sort once upfront (load doesn't matter)
    let baseRooms;
    if(isTapGroup) {
      baseRooms = allowedRooms;
    } else if(!isLargeRoomGroup) {
      baseRooms = [...allowedRooms].sort((a,b) => baseRoomScore(a) - baseRoomScore(b));
    } else {
      baseRooms = allowedRooms; // will be re-sorted per time slot below
    }

    // ── Time-first search — re-sort big three by live load at each slot ───────
    for(let start = groupStart; start + len <= windowEnd; start++) {
      const end = start + len;
      if(isBlockedTime(start, end)) continue;
      const dancerConflict = conflictsWithPlaced(gd.group, start, end);
      if(dancerConflict) { start = placed[dancerConflict].end - 1; continue; }

      const i1 = gd.assignedInstructor, i2 = gd.assignedInstructor2;
      const i1ok = !i1 || i1==='TBD' || instrFreeAt(i1, start, end);
      const i2ok = !i2 || i2==='TBD' || instrFreeAt(i2, start, end);
      if(gd.instr2Logic === 'OR') {
        if(!i1ok && !i2ok) continue;
      } else {
        if(!i1ok || !i2ok) continue;
      }

      // For big-three-gated groups: distribute evenly AND pack back-to-back.
      // Sort by fewest sessions placed today first (even distribution across all three).
      // Tiebreak by most-recently-freed (packs back-to-back when counts are equal).
      let tryRooms;
      if(isLargeRoomGroup) {
        const sessCount = r => (roomTimelines[r]||[]).length;
        const lastEnd   = r => Math.max(0, ...(roomTimelines[r]||[]).map(s => s.end));
        tryRooms = [...allowedRooms].sort((a,b) => {
          const ca = sessCount(a), cb = sessCount(b);
          if(ca !== cb) return ca - cb;          // fewest sessions first → even distribution
          const la = lastEnd(a), lb = lastEnd(b);
          if(la !== lb) return lb - la;          // most recently freed → back-to-back packing
          return ROOM_PRIORITY.indexOf(a) - ROOM_PRIORITY.indexOf(b);
        });
      } else {
        tryRooms = baseRooms;
      }

      for(const room of tryRooms) {
        if(roomFreeAt(room, start, end)) return { start, end, room };
      }
    }
    return null;
  }

  // PASS 1: greedy placement in conflict order
  const pass2 = [];
  for(const gd of sortedGroups) {
    const slot = tryPlace(gd);
    if(slot) {
      placed[gd.group] = slot;
      roomTimelines[slot.room].push({ start:slot.start, end:slot.end, group:gd.group });
      // OR groups alternate instructors by week — odd weeks get instr1, even get instr2
      let instrStr;
      if(gd.instr2Logic === 'OR' && gd.assignedInstructor && gd.assignedInstructor2 && gd.assignedInstructor2 !== 'TBD') {
        const wk = weekNum || 1;
        const primary   = wk % 2 === 1 ? gd.assignedInstructor  : gd.assignedInstructor2;
        const secondary = wk % 2 === 1 ? gd.assignedInstructor2 : gd.assignedInstructor;
        // Use primary if free, otherwise secondary
        instrStr = instrFreeAt(primary, slot.start, slot.end) ? primary : secondary;
      } else {
        instrStr = [gd.assignedInstructor, gd.assignedInstructor2].filter(x=>x&&x!=='TBD').join('/') || 'TBD';
      }
      sessions.push({
        time_start:  minsToTime(slot.start),
        time_end:    minsToTime(slot.end),
        group:       gd.group,
        instructor:  instrStr,
        room:        slot.room,
        style:       (gd.styles||[])[0] || '',
        dancer_count: gd.memberCount || 0,
        notes:       ''
      });
    } else {
      pass2.push(gd);
    }
  }

  // PASS 2: retry unplaced — try relaxing to sessLenMin-1 (29 min) as last resort
  const stillUnplaced = [];
  for(const gd of pass2) {
    // Try with a compressed length (minimum 15 min or half of original, whichever is larger)
    const origMin = gd.sessLenMin;
    gd.sessLenMin = Math.max(15, Math.floor(origMin * 0.5));
    const slot = tryPlace(gd);
    gd.sessLenMin = origMin;
    if(slot) {
      placed[gd.group] = slot;
      roomTimelines[slot.room].push({ start:slot.start, end:slot.end, group:gd.group });
      let instrStr2;
      if(gd.instr2Logic === 'OR' && gd.assignedInstructor && gd.assignedInstructor2 && gd.assignedInstructor2 !== 'TBD') {
        const wk = weekNum || 1;
        const primary   = wk % 2 === 1 ? gd.assignedInstructor  : gd.assignedInstructor2;
        const secondary = wk % 2 === 1 ? gd.assignedInstructor2 : gd.assignedInstructor;
        instrStr2 = instrFreeAt(primary, slot.start, slot.end) ? primary : secondary;
      } else {
        instrStr2 = [gd.assignedInstructor, gd.assignedInstructor2].filter(x=>x&&x!=='TBD').join('/') || 'TBD';
      }
      sessions.push({
        time_start:  minsToTime(slot.start),
        time_end:    minsToTime(slot.end),
        group:       gd.group,
        instructor:  instrStr2,
        room:        slot.room,
        style:       (gd.styles||[])[0] || '',
        dancer_count: gd.memberCount || 0,
        notes:       'compressed'
      });
    } else {
      stillUnplaced.push(gd);
    }
  }

  // Sort sessions by room then time for clean output
  sessions.sort((a,b) => a.room.localeCompare(b.room) || timeToMins(a.time_start)-timeToMins(b.time_start));

  // PASS 3: Ballet room enforcement — if any Ballet group (non-solo/duo/trio) landed
  // in a medium/small room despite the hard rule (e.g. all large rooms were full at
  // placement time), try to upgrade it now that the full picture is known.
  // Non-Ballet groups stay wherever tryPlace put them — medium rooms should be used.
  const LARGE_CAP = 40;
  const ROOM_PRIORITY = ['Balanchine','Ailey','Tallchief','Fosse','Graham','DeMille'];
  const largeRooms = rooms.filter(r => r.maxOcc >= LARGE_CAP).map(r => r.name)
    .sort((a,b) => ROOM_PRIORITY.indexOf(a) - ROOM_PRIORITY.indexOf(b));

  sessions.forEach(sess => {
    const grpDef = groupsToPlace.find(g => g.group === sess.group);
    const isBalletGroup = (grpDef?.styles||[]).includes('Ballet');
    const isSoloDuoTrio = (grpDef?.category||'') === 'solo_duo_trio';
    const isVariationGrp = (grpDef?.category||'') === 'variation';

    // Only upgrade competition/performance Ballet groups — not variations or SDT
    if(!isBalletGroup || isSoloDuoTrio || isVariationGrp) return;
    if(grpDef?.styles?.includes('Tap')) return;
    if(grpDef?.assignedRoom) return;
    const currentCap = rooms.find(r => r.name === sess.room)?.maxOcc || 0;
    if(currentCap >= LARGE_CAP) return;

    const start = timeToMins(sess.time_start);
    const end   = timeToMins(sess.time_end);

    for(const largeRoom of largeRooms) {
      const roomDef = rooms.find(r => r.name === largeRoom);
      if(!roomDef) continue;
      if(roomDef.styles?.length) {
        const sessStyle = sess.style || (grpDef?.styles||[])[0] || '';
        if(sessStyle && !roomDef.styles.includes(sessStyle)) continue;
      }
      const isOccupied = roomTimelines[largeRoom]?.some(s =>
        start < s.end && s.start < end && s.group !== sess.group
      );
      if(!isOccupied && roomFreeAt(largeRoom, start, end)) {
        roomTimelines[sess.room] = (roomTimelines[sess.room]||[]).filter(s => s.group !== sess.group);
        if(!roomTimelines[largeRoom]) roomTimelines[largeRoom] = [];
        roomTimelines[largeRoom].push({ start, end, group: sess.group });
        sess.room = largeRoom;
        break;
      }
    }
  });

  return { sessions, unplaced: stillUnplaced };
}

function renderInstrLoad(b) {
  const toM = t => { const [h,m]=(t||'00:00').split(':').map(Number); return h*60+m; };
  const days = S.schedule.schedule||[];

  // Build per-instructor per-day minutes
  const instrDayMins = {};
  const instrTotalMins = {};
  const instrNames = new Set();

  days.forEach(day => {
    (day.sessions||[]).forEach(s => {
      const instrs = (s.instructor||'').split('/').map(x=>x.trim()).filter(Boolean);
      const dur = toM(s.time_end) - toM(s.time_start);
      instrs.forEach(name => {
        instrNames.add(name);
        if(!instrDayMins[name]) instrDayMins[name] = {};
        instrDayMins[name][day.day] = (instrDayMins[name][day.day]||0) + dur;
        instrTotalMins[name] = (instrTotalMins[name]||0) + dur;
      });
    });
  });

  // Also count standing classes from blockedTimes
  S.blockedTimes.forEach(b2 => {
    if(!b2.assignedInstructor) return;
    const name = b2.assignedInstructor;
    const dur = toM(b2.timeEnd) - toM(b2.timeStart);
    instrNames.add(name);
    if(!instrDayMins[name]) instrDayMins[name] = {};
    instrDayMins[name][b2.day] = (instrDayMins[name][b2.day]||0) + dur;
    instrTotalMins[name] = (instrTotalMins[name]||0) + dur;
  });

  const allDays = [...new Set(days.map(d=>d.day))];
  const DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  allDays.sort((a,b) => DAY_ORDER.indexOf(a) - DAY_ORDER.indexOf(b));

  const instrs = [...instrNames].sort();
  if(!instrs.length) { b.innerHTML = `<div class="empty"><h3>No instructor data</h3><p>Generate a schedule with instructors assigned.</p></div>`; return; }

  const maxMins = Math.max(...instrs.map(n => instrTotalMins[n]||0));
  const fmt = m => m >= 60 ? (m/60).toFixed(1)+'h' : m+'m';

  b.innerHTML = `
<div style="padding:20px">
  <div style="font-size:13px;font-weight:600;color:var(--gold);margin-bottom:4px">Instructor Load</div>
  <div style="font-size:11.5px;color:var(--faint);margin-bottom:20px">Total scheduled rehearsal time per instructor across all days. Standing classes included.</div>

  ${instrs.map(name => {
    const total = instrTotalMins[name]||0;
    const barW = maxMins > 0 ? Math.round((total/maxMins)*100) : 0;

    return `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:5px">
        <span style="font-size:13px;font-weight:600;color:var(--text);min-width:90px">${name}</span>
        <span style="font-size:12px;color:var(--gold);font-weight:600">${fmt(total)}</span>
      </div>
      <div style="position:relative;height:20px;background:var(--s2);border-radius:4px;overflow:hidden;margin-bottom:6px">
        <div style="position:absolute;left:0;top:0;height:100%;width:${barW}%;background:rgba(74,159,212,.4);border-radius:4px;transition:width .3s"></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${allDays.map(day => {
          const mins = instrDayMins[name]?.[day]||0;
          if(!mins) return '';
          return `<span style="font-size:10.5px;padding:2px 7px;border-radius:4px;background:var(--s2);border:1px solid var(--border-s);color:var(--muted)">
            <span style="color:var(--faint)">${day.slice(0,3)}</span> ${fmt(mins)}
          </span>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}
</div>`;
}

function renderConflictMatrix(b) {
  // Build group list — all defined groups plus dancer-derived
  const allGroups = [...new Set([
    ...S.groups.map(g=>g.id||g.name),
    ...S.dancers.flatMap(d=>d.groups)
  ])].filter(Boolean).sort();

  if(allGroups.length < 2) {
    b.innerHTML = `<div class="empty"><h3>Not enough groups</h3><p>Load groups and dancers first.</p></div>`;
    return;
  }

  // Build shared-dancer count matrix
  const matrix = {};
  allGroups.forEach(a => {
    matrix[a] = {};
    allGroups.forEach(c => { matrix[a][c] = 0; });
  });
  S.dancers.forEach(d => {
    const dGroups = (d.groups||[]).filter(g => allGroups.includes(g));
    for(let i=0; i<dGroups.length; i++) {
      for(let j=i+1; j<dGroups.length; j++) {
        matrix[dGroups[i]][dGroups[j]]++;
        matrix[dGroups[j]][dGroups[i]]++;
      }
    }
  });

  // Max value for color scaling
  const vals = allGroups.flatMap(a => allGroups.filter(c=>a!==c).map(c=>matrix[a][c]));
  const maxVal = Math.max(...vals, 1);

  // Color scale: 0 = transparent, max = rose
  const cellColor = v => {
    if(v === 0) return 'transparent';
    const intensity = v/maxVal;
    return `rgba(74,159,212,${(0.1 + intensity*0.7).toFixed(2)})`;
  };

  const cellW = Math.max(28, Math.min(48, Math.floor(600/allGroups.length)));
  const labelW = 90;

  b.innerHTML = `
<div style="padding:20px">
  <div style="font-size:13px;font-weight:600;color:var(--gold);margin-bottom:4px">Dancer Conflict Matrix</div>
  <div style="font-size:11.5px;color:var(--faint);margin-bottom:16px">Number of shared dancers between each pair of groups. Higher = more scheduling pressure. Diagonal excluded.</div>

  <!-- Legend -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:11px;color:var(--faint)">
    <span>0</span>
    <div style="display:flex;gap:1px">${[0,.2,.4,.6,.8,1].map(v=>`<div style="width:20px;height:12px;border-radius:2px;background:rgba(74,159,212,${(0.1+v*0.7).toFixed(2)})"></div>`).join('')}</div>
    <span>${maxVal} shared</span>
  </div>

  <div style="overflow:auto;max-height:calc(100vh - 280px)">
    <table style="border-collapse:collapse;font-size:10px">
      <thead>
        <tr>
          <th style="width:${labelW}px;min-width:${labelW}px"></th>
          ${allGroups.map(g=>`<th style="width:${cellW}px;min-width:${cellW}px;padding:2px;writing-mode:vertical-rl;transform:rotate(180deg);text-align:left;font-weight:400;color:var(--muted);white-space:nowrap;max-height:80px;overflow:hidden;text-overflow:ellipsis" title="${g}">${g.replace(/_/g,' ').slice(0,12)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${allGroups.map(a => `
        <tr>
          <td style="padding:2px 6px 2px 0;font-size:10.5px;color:var(--muted);white-space:nowrap;text-align:right;max-width:${labelW}px;overflow:hidden;text-overflow:ellipsis" title="${a}">${a.replace(/_/g,' ').slice(0,14)}</td>
          ${allGroups.map(c => {
            if(a===c) return `<td style="width:${cellW}px;height:${cellW}px;background:var(--s2);border:1px solid var(--border-s)"></td>`;
            const v = matrix[a][c];
            return `<td title="${a} ↔ ${c}: ${v} shared dancer${v!==1?'s':''}"
              style="width:${cellW}px;height:${cellW}px;background:${cellColor(v)};border:1px solid var(--border-s);text-align:center;vertical-align:middle;font-weight:${v>0?'600':'400'};color:${v>0?'var(--text)':'var(--faint)'}">
              ${v||''}
            </td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════
// CLUSTER D — UNDO / REDO
// ═══════════════════════════════════════════════════════
const HISTORY_MAX = 20;

function pushHistory() {
  // Snapshot only schedule-related state — groups/dancers come from CSV
  const snap = {
    schedule:        S.schedule ? JSON.parse(JSON.stringify(S.schedule)) : null,
    removedSessions: JSON.parse(JSON.stringify(S.removedSessions||[])),
    groupAssignments: S.groups.map(g => JSON.parse(JSON.stringify(g))),
  };
  S._history.push(snap);
  if(S._history.length > HISTORY_MAX) S._history.shift();
  S._historyFuture = []; // clear redo on new action
  updateUndoButtons();
}

function undoHistory() {
  if(!S._history.length) return toast('Nothing to undo','err');
  // Save current state to redo stack
  S._historyFuture.push({
    schedule:        S.schedule ? JSON.parse(JSON.stringify(S.schedule)) : null,
    removedSessions: JSON.parse(JSON.stringify(S.removedSessions||[])),
    groupAssignments: S.groups.map(g => JSON.parse(JSON.stringify(g))),
  });
  const snap = S._history.pop();
  applySnapshot(snap);
  toast('Undo','ok');
}

function redoHistory() {
  if(!S._historyFuture.length) return toast('Nothing to redo','err');
  S._history.push({
    schedule:        S.schedule ? JSON.parse(JSON.stringify(S.schedule)) : null,
    removedSessions: JSON.parse(JSON.stringify(S.removedSessions||[])),
    groupAssignments: S.groups.map(g => JSON.parse(JSON.stringify(g))),
  });
  const snap = S._historyFuture.pop();
  applySnapshot(snap);
  toast('Redo','ok');
}

function applySnapshot(snap) {
  S.schedule        = snap.schedule;
  S.removedSessions = snap.removedSessions || [];
  if(snap.groupAssignments?.length) {
    snap.groupAssignments.forEach(saved => {
      const gr = S.groups.find(g => g.id===saved.id || g.name===saved.name);
      if(gr) Object.assign(gr, saved);
    });
  }
  renderSchedule();
  if(S.schedule) showSTab('output');
  if(_activeWeekDay) {
    setTimeout(() => switchDayWeek(_activeWeekDay.pid, _activeWeekDay.idx), 0);
  }
  // Must run after renderSchedule rebuilds the DOM
  updateUndoButtons();
}

function updateUndoButtons() {
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');
  if(undoBtn) {
    undoBtn.disabled = S._history.length === 0;
    undoBtn.style.opacity = S._history.length === 0 ? '0.4' : '1';
    undoBtn.title = S._history.length ? `Undo (${S._history.length} step${S._history.length>1?'s':''})` : 'Nothing to undo';
  }
  if(redoBtn) {
    redoBtn.disabled = S._historyFuture.length === 0;
    redoBtn.style.opacity = S._historyFuture.length === 0 ? '0.4' : '1';
    redoBtn.title = S._historyFuture.length ? `Redo (${S._historyFuture.length} step${S._historyFuture.length>1?'s':''})` : 'Nothing to redo';
  }
}

// Keyboard handler
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) {
    e.preventDefault(); undoHistory();
  }
  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))) {
    e.preventDefault(); redoHistory();
  }
});

// ── Drag-and-drop handlers ──────────────────────────────
let _drag = null; // current drag state

function schedDragStart(e) {
  hideSchedTip();
  try {
    _drag = JSON.parse(decodeURIComponent(e.currentTarget.dataset.sess));
    _drag.durMins = timeToMinsDnD(_drag.time_end) - timeToMinsDnD(_drag.time_start);
    // Offset within block so cursor stays at same relative position
    const rect = e.currentTarget.getBoundingClientRect();
    _drag.offsetY = e.clientY - rect.top;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', _drag.group);
    e.currentTarget.style.opacity = '0.4';
  } catch(err) { _drag = null; }
}

function schedDragEnd(e) {
  e.currentTarget.style.opacity = '';
  _drag = null;
  // Clear any drop highlights
  document.querySelectorAll('[data-room]').forEach(el => {
    el.style.background = '';
    el.style.outline = '';
  });
}

function schedDragOver(e) {
  if(!_drag) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  // Validate on hover — green tint if valid, rose if not
  const newRoom = col.dataset.room;
  const newStart = snapToGrid(col, e);
  const newEnd = newStart + _drag.durMins;
  const valid = validateDnDMove(_drag, newRoom, newStart, newEnd, col.dataset.date);
  col.style.outline = '2px solid ' + (valid ? 'var(--green)' : 'var(--rose)');
  col.style.background = valid ? 'rgba(82,184,114,.06)' : 'rgba(217,96,96,.06)';
}

function schedDragLeave(e) {
  const col = e.currentTarget;
  col.style.background = '';
  col.style.outline = '';
}

function schedDrop(e) {
  e.preventDefault();
  const col = e.currentTarget;
  col.style.background = '';
  col.style.outline = '';
  if(!_drag) return;

  const newRoom  = col.dataset.room;
  const newStart = snapToGrid(col, e);
  const newEnd   = newStart + _drag.durMins;
  const date     = col.dataset.date || _drag.date;

  const valid = validateDnDMove(_drag, newRoom, newStart, newEnd, date);
  if(!valid) {
    toast('Cannot place here — dancer or instructor conflict','err');
    _drag = null;
    return;
  }

  pushHistory(); // save undo snapshot before mutating

  // Remember which week/day panel is currently visible
  const activePanel = document.querySelector('[id^="swk"][id*="p"]:not([style*="display: none"]):not([style*="display:none"])');
  if(activePanel) {
    const m = activePanel.id.match(/^(swk\d+)p(\d+)$/);
    if(m) _activeWeekDay = { pid: m[1], idx: parseInt(m[2]) };
  }

  // Find and update the session in S.schedule
  const days = S.schedule.schedule||[];
  const dayObj = days.find(d => d.date === date || d.day === col.dataset.day);
  if(!dayObj) { toast('Day not found','err'); return; }
  const sess = (dayObj.sessions||[]).find(s => s.group === _drag.group && s.time_start === _drag.time_start && s.room === _drag.origRoom);
  if(!sess) { toast('Session not found','err'); return; }

  sess.room       = newRoom;
  sess.time_start = minsToTimeDnD(newStart);
  sess.time_end   = minsToTimeDnD(newEnd);

  _drag = null;
  renderSchedule();
  showSTab('output');
  // Restore the day panel that was active before the drop
  if(_activeWeekDay) {
    setTimeout(() => switchDayWeek(_activeWeekDay.pid, _activeWeekDay.idx), 0);
  }
  updateUndoButtons();
  toast(`${sess.group.replace(/_/g,' ')} moved to ${newRoom} · ${sess.time_start}–${sess.time_end}`,'ok');
}

function timeToMinsDnD(t) {
  if(!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h*60+(m||0);
}
function minsToTimeDnD(m) {
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
}
function snapToGrid(col, e) {
  const openB  = parseInt(col.dataset.open)||0;
  const rowH   = parseInt(col.dataset.rowh)||28;
  const rect   = col.getBoundingClientRect();
  const offsetY = e.clientY - rect.top + (col.closest('[style*="overflow-x"]')?.scrollTop||0);
  const rawMins = openB + Math.round(offsetY / rowH) * 15;
  return Math.round(rawMins / 15) * 15;
}

function validateDnDMove(drag, newRoom, newStartMins, newEndMins, date) {
  if(!S.schedule) return false;
  const days = S.schedule.schedule||[];
  const dayObj = days.find(d => d.date === date);
  if(!dayObj) return false;

  const sessions = (dayObj.sessions||[]).filter(s =>
    !(s.group === drag.group && s.time_start === drag.time_start && s.room === drag.origRoom)
  );

  // Room collision
  const roomConflict = sessions.some(s =>
    s.room === newRoom &&
    timeToMinsDnD(s.time_start) < newEndMins &&
    timeToMinsDnD(s.time_end) > newStartMins
  );
  if(roomConflict) return false;

  // Dancer conflict — any session sharing dancers that overlaps in time
  const movedDancers = new Set(
    S.dancers.filter(d => d.groups.includes(drag.group)).map(d => d.id||d.name)
  );
  const dancerConflict = sessions.some(s => {
    if(!(timeToMinsDnD(s.time_start) < newEndMins && timeToMinsDnD(s.time_end) > newStartMins)) return false;
    return S.dancers.some(d => (d.id||d.name) && movedDancers.has(d.id||d.name) && d.groups.includes(s.group));
  });
  if(dancerConflict) return false;

  // Instructor conflict
  const movedInstrs = new Set((S.groups.find(g=>g.name===drag.group||g.id===drag.group)?.assignedInstructor||'').split('/').map(x=>x.trim()).filter(Boolean));
  if(movedInstrs.size) {
    const instrConflict = sessions.some(s => {
      if(!(timeToMinsDnD(s.time_start) < newEndMins && timeToMinsDnD(s.time_end) > newStartMins)) return false;
      const sInstrs = (s.instructor||'').split('/').map(x=>x.trim());
      return sInstrs.some(i => movedInstrs.has(i));
    });
    if(instrConflict) return false;
  }

  return true;
}

async function generateSchedule() {
  if (!S.dancers.length) return toast('Load roster first','err');
  if (!S.groups.length)  return toast('Load groups first','err');
  const sp = S.schedParams;

  S.generating=true; S.removedSessions=[]; 
  pushHistory(); // snapshot before overwriting
  renderSchedule(); showSTab('params');
  const prog=g('gen-progress'), stat=g('gen-status'), bar=g('gpf');
  if(prog) prog.style.display='block';
  const setP=(pct,msg)=>{if(bar)bar.style.width=pct+'%';if(stat)stat.textContent=msg;};

  try {
    setP(5,'Building group roster…');

    if(!sp.fridayDate) {
      toast('Pick a weekend date first','err');
      S.generating=false; renderSchedule(); return;
    }

    const groups = (sp.groups||[...new Set([
      ...S.dancers.flatMap(d=>d.groups),
      ...S.groups.map(g=>g.id||g.name)   // include all defined groups even if no dancers yet
    ])]).filter(Boolean);
    const relevantDancers = S.dancers.filter(d=>d.groups.some(gr=>groups.includes(gr)));

    // Build group metadata
    const normalize = s => (s||'').toLowerCase().replace(/[-_\s]+/g, '_');
    const groupData = groups.map(gr=>{
      // Match by exact id/name first, then by normalized name (handles hyphen vs underscore mismatch)
      const grpDef = S.groups.find(x=>x.name===gr||x.id===gr)
        || S.groups.find(x=>normalize(x.name)===normalize(gr)||normalize(x.id)===normalize(gr))
        || {};
      const members = relevantDancers.filter(d=>d.groups.includes(gr));
      const defLen = sp.defaultSessLen || 30;
      // Priority order (highest to lowest):
      // 1. Per-group override in Parameters UI  (sp.groupLengths[gr])
      // 2. Variation tier time (if group has a variationTier set)
      // 3. Default session length in Parameters (sp.defaultSessLen)
      // 4. CSV sessLenMin only if it differs from 30 (the old hardcoded default)
      const tierLen = grpDef.variationTier && S.variationTierTimes[grpDef.variationTier]
        ? S.variationTierTimes[grpDef.variationTier] : 0;
      const csvLen = grpDef.sessLenMin && grpDef.sessLenMin !== 30 ? grpDef.sessLenMin : 0;
      const grpLen = sp.groupLengths?.[gr] || tierLen || defLen || csvLen || 30;
      return {
        group:              gr,
        memberCount:        members.length,
        sessLenMin:         grpLen,
        sessLenMax:         grpLen,
        assignedInstructor:  grpDef.assignedInstructor||'',
        assignedInstructor2: grpDef.assignedInstructor2||'',
        instr2Logic:         grpDef.instr2Logic||'AND',
        assignedRoom:        grpDef.assignedRoom||'',
        assignedDay:         grpDef.assignedDay||'',
        assignedTimeStart:   grpDef.assignedTimeStart||'',
        assignedTimeEnd:     grpDef.assignedTimeEnd||'',
        allowedDays:         grpDef.allowedDays||[],
        styles:              grpDef.styles||[],
        category:            grpDef.category||'competition',
        type:                grpDef.type||'small',
      };
    });

    // ── ASSIGN GROUPS TO DAYS ────────────────────────────────────────────────
    setP(10,'Assigning groups to days…');

    const canGroups  = groupData.filter(g=>g.group.startsWith('CAN'));
    const affPrep    = groupData.filter(g=>g.group.startsWith('AFF-PREP'));
    const affNum     = groupData.filter(g=>g.group.startsWith('AFF-')&&!g.group.startsWith('AFF-PREP'));

    // Friday:  AFF-PREP + fill-ins
    // Saturday: Performances only
    // Sunday:  AFF numbered + ALL CAN + fill-ins
    // Build full 7-day plan — respect per-group allowedDays restrictions
    const weekBase = new Date(sp.fridayDate+'T12:00:00');
    const dayOffsets = {Friday:0, Saturday:1, Sunday:2, Monday:-4, Tuesday:-3, Wednesday:-2, Thursday:-1};

    // Default routing: AFF-PREP→Fri, AFF-#→Sun, CAN→Sun
    // Non-competition categories:
    //   performance → Saturday only (hard)
    //   variation   → place once, any day Mon–Sun (best fit, not fill-in)
    //   solo_duo_trio → place once, any day Mon–Sun
    function getGroupDay(gd) {
      if(gd.assignedDay)         return gd.assignedDay;
      if(gd.allowedDays?.length) return gd.allowedDays[0];
      if(gd.category === 'performance')   return 'Saturday';
      if(gd.category === 'variation')     return '__flex__';
      if(gd.category === 'solo_duo_trio') return '__flex__';
      // Competition routing by prefix
      if(gd.group.startsWith('AFF-PREP')) return 'Friday';
      if(gd.group.startsWith('CAN'))      return 'Sunday';
      return 'Sunday';
    }

    const rooms = S.rooms.length ? S.rooms : [{name:'Main Studio',styles:[],maxOcc:50}];
    const allDayResults = [];
    const globalUnplaced = [];

    // ── Build list of weekends to solve ──────────────────────────────────────
    const numWeeks = sp.multiWeekend ? (sp.numWeekends || 4) : 1;
    const baseFri  = new Date(sp.fridayDate+'T12:00:00');
    const weekends = Array.from({length: numWeeks}, (_, i) => {
      const fri = new Date(baseFri); fri.setDate(baseFri.getDate() + i*7);
      const sun = new Date(fri);     sun.setDate(fri.getDate() + 2);
      return {
        fridayDate: fri.toISOString().slice(0,10),
        sundayDate: sun.toISOString().slice(0,10),
        weekNum: i+1
      };
    });

    // ── SOLVE EACH WEEKEND ────────────────────────────────────────────────────
    for(let wi=0; wi<weekends.length; wi++) {
      const wk = weekends[wi];
      const weekBase = new Date(wk.fridayDate+'T12:00:00');
      const weekLabel = numWeeks > 1 ? ` (Week ${wk.weekNum}/${numWeeks})` : '';

      // Helper: check if a group's dancers have a rest day on the given day
      function groupHasRestDay(gd, dayName) {
        if(!Object.keys(S.skillLevelDaysOff).length) return false;
        const groupDancers = relevantDancers.filter(d => d.groups.includes(gd.group));
        return groupDancers.some(d =>
          d.sl && S.skillLevelDaysOff[d.sl]?.includes(dayName)
        );
      }

      // Build day plan for this weekend
      const dayBuckets = {};
      const flexGroups = []; // variations/SDT — placed once across all active days

      groupData.forEach(gd => {
        const day = getGroupDay(gd);
        if(day === '__flex__') {
          flexGroups.push(gd);
        } else if(day === '__all__') {
          flexGroups.push(gd);
        } else {
          // Skip if any dancer in this group has a rest day on the assigned day
          if(groupHasRestDay(gd, day)) return;
          if(!dayBuckets[day]) dayBuckets[day] = [];
          dayBuckets[day].push(gd);
        }
      });

      // Distribute flex groups round-robin across days that already have competition groups.
      // This ensures variations/SDT land on active days alongside real sessions.
      // Fall back to all sp.days if no competition days exist yet.
      const SCHED_ORDER = ['Friday','Saturday','Sunday','Monday','Tuesday','Wednesday','Thursday'];
      const competitionDays = Object.keys(dayBuckets).sort(
        (a,b) => SCHED_ORDER.indexOf(a) - SCHED_ORDER.indexOf(b)
      );
      const flexTargetDays = competitionDays.length
        ? competitionDays
        : (sp.days||[]).slice().sort((a,b) => SCHED_ORDER.indexOf(a) - SCHED_ORDER.indexOf(b));

      flexGroups.forEach((gd, i) => {
        // Skip days that are rest days for this group's dancers
        const validDays = flexTargetDays.filter(d => !groupHasRestDay(gd, d));
        const pool = validDays.length ? validDays : flexTargetDays; // fallback if all blocked
        const targetDay = pool[i % pool.length];
        if(!targetDay) return;
        if(!dayBuckets[targetDay]) dayBuckets[targetDay] = [];
        dayBuckets[targetDay].push({...gd, _flex:true});
      });

      const dayOffsets = {Friday:0, Saturday:1, Sunday:2, Monday:-4, Tuesday:-3, Wednesday:-2, Thursday:-1};
      const dayPlan = Object.entries(dayBuckets).map(([day, grps]) => {
        const offset = dayOffsets[day] ?? 0;
        const d = new Date(weekBase); d.setDate(weekBase.getDate()+offset);
        // Competition/performance groups first, then flex groups (variations/SDT)
        return { date:d.toISOString().slice(0,10), day, groups:grps };
      }).filter(d=>d.groups.length);

      for(let i=0; i<dayPlan.length; i++) {
        const { date, day, groups:dayGroups } = dayPlan[i];
        const pct = 10 + ((wi*dayPlan.length+i+1)/(weekends.length*dayPlan.length))*55;
        setP(pct, `Week ${wk.weekNum}: ${day} ${date}${weekLabel} — ${dayGroups.length} groups…`);
        await new Promise(r=>setTimeout(r,10));

        const { sessions, unplaced } = solveDay(
          date, day, dayGroups, groupData, rooms, S.blockedTimes, relevantDancers, wk.weekNum
        );
        if(sessions.length) allDayResults.push({ day, date, sessions, weekNum: wk.weekNum });
        if(wi === weekends.length-1) globalUnplaced.push(...unplaced.map(g=>({...g, preferredDay:day})));
      }
    }

    // ── PASS 3: distribute unplaced across ALL 7 days ────────────────────────
    if(globalUnplaced.length) {
      setP(68, `Pass 3: fitting ${globalUnplaced.length} overflow groups across weekdays…`);
      await new Promise(r=>setTimeout(r,10));

      // Build weekday dates from the weekend date
      const fri = new Date(sp.fridayDate+'T12:00:00');
      const weekdays = [
        { day:'Monday',    offset:-4 },
        { day:'Tuesday',   offset:-3 },
        { day:'Wednesday', offset:-2 },
        { day:'Thursday',  offset:-1 },
      ].map(({day,offset})=>{
        const d = new Date(fri); d.setDate(fri.getDate()+offset);
        return { day, date:d.toISOString().slice(0,10), groups:[] };
      });

      // Distribute unplaced evenly across weekdays
      globalUnplaced.forEach((g,i)=>{ weekdays[i%weekdays.length].groups.push(g); });

      for(const wd of weekdays.filter(w=>w.groups.length)) {
        setP(68, `Overflow: ${wd.day} ${wd.date} — ${wd.groups.length} groups…`);
        await new Promise(r=>setTimeout(r,10));
        const {sessions, unplaced:stillOut} = solveDay(
          wd.date, wd.day, wd.groups, groupData, rooms, S.blockedTimes, relevantDancers
        );
        if(sessions.length) allDayResults.push({day:wd.day, date:wd.date, sessions});
        stillOut.forEach(g=>{
          S.removedSessions.push({group:g.group, date:'unplaced', time:'—', reason:'No valid slot found across entire week'});
        });
      }
    }

    setP(80,'Validating…');

    // Sort days chronologically
    allDayResults.sort((a,b)=>a.date.localeCompare(b.date));

    // ── Inject standing class times into schedule ─────────────────────────────
    if(S.blockedTimes?.length) {
      // Get all days that have classes
      const classDays = [...new Set(S.blockedTimes.map(b=>b.day))];

      // For each class day, find or create a day entry in allDayResults
      classDays.forEach(dayName=>{
        const classes = S.blockedTimes.filter(b=>b.day===dayName);
        if(!classes.length) return;

        // Find existing day entry or create one for each weekend
        const numWeeksLocal = sp.multiWeekend ? (sp.numWeekends||1) : 1;
        for(let wi=0;wi<numWeeksLocal;wi++){
          const baseFri2 = new Date(sp.fridayDate+'T12:00:00');
          baseFri2.setDate(baseFri2.getDate()+(wi*7));
          const dayOffsets2 = {Friday:0,Saturday:1,Sunday:2,Monday:-4,Tuesday:-3,Wednesday:-2,Thursday:-1};
          const offset = dayOffsets2[dayName];
          if(offset === undefined) return;
          const d = new Date(baseFri2); d.setDate(baseFri2.getDate()+offset);
          const dateStr = d.toISOString().slice(0,10);

          let dayEntry = allDayResults.find(x=>x.day===dayName && x.date===dateStr);
          if(!dayEntry){
            dayEntry = {day:dayName, date:dateStr, sessions:[], weekNum:wi+1};
            allDayResults.push(dayEntry);
          }

          classes.forEach(b=>{
            dayEntry.sessions.push({
              time_start:  b.timeStart,
              time_end:    b.timeEnd,
              group:       b.label||'Class',
              instructor:  b.assignedInstructor||'',
              room:        b.assignedRoom||'',
              dancer_count: 0,
              style:       '',
              notes:       b.notes||'',
              _isClass:    true
            });
          });
          dayEntry.sessions.sort((a,b2)=>timeToMins(a.time_start)-timeToMins(b2.time_start));
        }
      });
    }

    const merged = {
      schedule: allDayResults,
      conflicts: [],
      unplaceable: S.removedSessions,
      warnings: [],
      summary: `${allDayResults.flatMap(d=>d.sessions).length} sessions across ${allDayResults.length} days · ${S.removedSessions.length} groups unplaced`
    };

    S.schedule = merged;
    S.validationResults = validateSchedule(merged);


    setP(100,'Done!');
    const vErrs = S.validationResults.errors.length;
    const allSessions = allDayResults.flatMap(d=>d.sessions).filter(s=>!s._isClass);
    const placedGroups = new Set(allSessions.map(s=>s.group)).size;
    const totalGroups  = groups.length;
    const numWksLabel  = numWeeks > 1 ? ` × ${numWeeks} weekends` : '';
    toast(
      `Schedule complete — ${placedGroups}/${totalGroups} groups placed${numWksLabel}${S.removedSessions.length?' · '+S.removedSessions.length+' unplaced':''}`,
      vErrs>0?'err':'ok'
    );
    S.generating=false; renderSchedule(); showSTab('output');

  } catch(e) {
    console.error(e);
    toast('Error: '+e.message,'err');
    S.generating=false;
    const p=g('gen-progress'); if(p) p.style.display='none';
    renderSchedule();
  }
}

function renderStudentCheck(b) {
  const allSessions = (S.schedule.schedule||[]).flatMap(day=>
    (day.sessions||[]).map(s=>({...s,day:day.day,date:day.date}))
  );
  const toMins = t => { const [h,m]=(t||'00:00').split(':').map(Number); return h*60+m; };
  const overlaps = (a,bk) => toMins(a.time_start)<toMins(bk.time_end) && toMins(bk.time_start)<toMins(a.time_end);
  const sameDay = (a,bk) => (a.date||a.day)===(bk.date||bk.day);

  // Build per-student session list: rehearsal sessions they're in
  const studentSessions = {};
  S.dancers.filter(d=>d.is_competing!=='N').forEach(d=>{
    const mine = allSessions.filter(s=>d.groups.includes(s.group));
    if(mine.length) studentSessions[d.id] = {dancer:d, sessions:mine};
  });

  // Also build blocked-time sessions per student
  const toBlockKey = b => b.day+'|'+b.timeStart+'|'+b.timeEnd+'|'+b.label;

  // Check each student: rehearsal vs rehearsal overlap AND rehearsal vs blocked time overlap
  const issues = [];
  const clean = [];

  Object.values(studentSessions).forEach(({dancer:d, sessions:rehSessions})=>{
    const studentIssues = [];

    // Rehearsal vs rehearsal
    for(let i=0;i<rehSessions.length;i++){
      for(let j=i+1;j<rehSessions.length;j++){
        if(sameDay(rehSessions[i],rehSessions[j]) && overlaps(rehSessions[i],rehSessions[j])){
          studentIssues.push({
            type:'rehearsal',
            label:`Rehearsal overlap: ${rehSessions[i].group} (${rehSessions[i].time_start}–${rehSessions[i].time_end}) vs ${rehSessions[j].group} (${rehSessions[j].time_start}–${rehSessions[j].time_end}) on ${rehSessions[i].date||rehSessions[i].day}`
          });
        }
      }
    }

    // Rehearsal vs standing classes (from blocked times)
    S.blockedTimes.forEach(block=>{
      rehSessions.forEach(s=>{
        if(s.day!==block.day) return;
        const blockSess = {time_start:block.timeStart,time_end:block.timeEnd};
        if(!overlaps(s,blockSess)) return;
        // Does this block apply to this dancer?
        const levelMatch = block.appliesSL.length===0 ||
          block.appliesSL.some(sl=>
            sl===d.affect_level || sl===d.prepro_level ||
            sl===d.pointe_level || sl===d.tap_level ||
            (d.all_levels||'').includes(sl)
          );
        const groupMatch = block.appliesGroups.length===0 || block.appliesGroups.includes(s.group);
        if(levelMatch || groupMatch){
          studentIssues.push({
            type:'blocked',
            label:`Class conflict: rehearsal "${s.group}" on ${s.date||s.day} ${s.time_start}–${s.time_end} overlaps standing class "${block.label}" (${block.day} ${block.timeStart}–${block.timeEnd})`
          });
        }
      });
    });

    // School hours check — per-dancer dismissal time aware, with day-specific overrides
    const schoolStart = S.schedParams.schoolDayStart||'16:45';
    const weekdays = new Set(['Monday','Tuesday','Wednesday','Thursday','Friday']);
    rehSessions.forEach(s=>{
      if(!weekdays.has(s.day)) return;
      // Check day-specific override first
      const override = (d.dismissalOverrides||[]).find(o => o.day === s.day);
      let effectiveDismissal, dismissalNote;
      if (override) {
        if (override.offSchool) return; // off school = no school-hours constraint
        if (override.time) {
          effectiveDismissal = override.time;
          dismissalNote = `day override (${s.day})`;
        }
      }
      if (!effectiveDismissal) {
        if (d.schoolLevel && S.schoolDismissalTimes[d.schoolLevel]) {
          effectiveDismissal = S.schoolDismissalTimes[d.schoolLevel];
          dismissalNote = `${SCHOOL_LEVELS.find(l=>l.id===d.schoolLevel)?.label||d.schoolLevel} level`;
        } else {
          effectiveDismissal = schoolStart;
          dismissalNote = 'studio default';
        }
      }
      if(toMins(s.time_start) < toMins(effectiveDismissal)){
        studentIssues.push({
          type:'school',
          label:`School hours: rehearsal "${s.group}" starts at ${s.time_start} on ${s.day} — before ${dismissalNote} dismissal (${effectiveDismissal})${d.school?' · '+d.school:''}`
        });
      }
    });

    if(studentIssues.length){
      issues.push({dancer:d, issues:studentIssues, sessions:rehSessions});
    } else {
      clean.push({dancer:d, sessions:rehSessions});
    }
  });

  const typeColor = {rehearsal:'var(--rose)', blocked:'var(--gold)', school:'var(--purple)'};

  const fmt12 = t => { if(!t) return ''; const [h,m]=t.split(':').map(Number); const ap=h>=12?'pm':'am'; return (h%12||12)+(m?':'+String(m).padStart(2,'0'):'')+ap; };

  const instrList=Object.entries(instrMins).sort((a,b)=>b[1]-a[1]);
  const instrHtml=instrList.map(([nm,m])=>`<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:4px 10px;font-size:11.5px"><span style="color:var(--teal)">${nm}</span><span style="color:var(--muted);margin-left:6px">${(m/60).toFixed(1)}h</span></div>`).join('');

    +'<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">'
    +`<div style="text-align:center;min-width:70px"><div style="font-size:26px;font-weight:300;color:var(--gold);font-family:var(--fd)">${(totalMins/60).toFixed(1)}</div><div style="font-size:10.5px;color:var(--muted)">total hours</div></div>`

    +`<div style="text-align:center;min-width:70px"><div style="font-size:26px;font-weight:300;color:var(--sky);font-family:var(--fd)">${maxConcurrent}</div><div style="font-size:10.5px;color:var(--muted)">max concurrent</div></div>`
    +`<div style="text-align:center;min-width:70px"><div style="font-size:26px;font-weight:300;color:var(--muted);font-family:var(--fd)">${days.filter(d=>(d.sessions||[]).length).length}</div><div style="font-size:10.5px;color:var(--muted)">active days</div></div>`
    +(removed.length?`<div style="text-align:center;min-width:70px"><div style="font-size:26px;font-weight:300;color:var(--rose);font-family:var(--fd)">${removed.length}</div><div style="font-size:10.5px;color:var(--muted)">unplaced</div></div>`:'')
    +'</div>'
    +`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${dayHtml}</div>`
    +'<details><summary style="cursor:pointer;font-size:12px;color:var(--muted);margin-bottom:6px">Instructor hours ('
    +instrList.length+' instructors) — click to expand</summary>'
    +`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${instrHtml}</div></details>`
    +'</div>';
})()}

<!-- Schedule grid -->
${sc.summary?`<div style="margin-bottom:12px;padding:10px 14px;background:var(--s2);border-radius:var(--r);font-size:12px;color:var(--muted);font-style:italic">${sc.summary}</div>`:''}
${(()=>{
  const fmt12=t=>{if(!t)return '';const[h,m]=t.split(':').map(Number);return(h%12||12)+(m?':'+String(m).padStart(2,'0'):'')+( h>=12?'pm':'am');};
  const ROOM_ORDER=['Balanchine','Ailey','Tallchief','Fosse','Graham','DeMille','Slyde'];
  const DAY_ORDER=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const BLOCK=15,ROW_H=28;
  const activeDays=days.filter(d=>(d.sessions||[]).length);
  if(!activeDays.length) return '<div class="empty"><div class="empty-ico">◉</div><h3>No sessions yet</h3></div>';

  // Group by week number — section per week, day-of-week tabs within
  const byWeek={};
  activeDays.forEach(d=>{
    const wk=d.weekNum||1;
    (byWeek[wk]=byWeek[wk]||[]).push(d);
  });
  const weekNums=Object.keys(byWeek).map(Number).sort((a,b)=>a-b);

  function renderGrid(day){
    const allSess=[...(day.sessions||[])].sort((a,b)=>toM(a.time_start)-toM(b.time_start));
    // Classes with no room get their own pseudo-column
    const CLASS_COL = '★ Classes';
    const augSess = allSess.map(s=>({...s, room: s.room||(s._isClass?CLASS_COL:'')}));
    const activeRooms=[...new Set(augSess.map(s=>s.room).filter(Boolean))].sort((a,b)=>{
      if(a===CLASS_COL) return -1; if(b===CLASS_COL) return 1;
      const ai=ROOM_ORDER.indexOf(a),bi=ROOM_ORDER.indexOf(b);return(ai===-1?99:ai)-(bi===-1?99:bi);
    });
    if(!activeRooms.length) return '<div style="padding:20px;color:var(--faint)">No sessions</div>';
    const openB=Math.floor(toM(S.schedParams.dayHours?.[day.day]?.open||'09:00')/BLOCK)*BLOCK;
    const closeB=Math.ceil(toM('21:45')/BLOCK)*BLOCK;
    const totalB=(closeB-openB)/BLOCK;
    const colW=72,roomW=140;
    const byRoom={};
    activeRooms.forEach(rm=>{byRoom[rm]=augSess.filter(s=>s.room===rm);});
    const ticks=[];
    for(let i=0;i<=totalB;i++){const m2=openB+i*BLOCK;ticks.push({m:m2,lbl:m2%30===0?fmt12(String(Math.floor(m2/60)).padStart(2,'0')+':'+String(m2%60).padStart(2,'0')):null});}
    const timeAxis='<div style="width:'+colW+'px;flex-shrink:0;position:relative;height:'+(totalB*ROW_H)+'px;background:var(--s2);border-right:1px solid var(--border-s)">'+ticks.map(t=>'<div style="position:absolute;top:'+((t.m-openB)/BLOCK*ROW_H)+'px;left:0;right:0;height:1px;background:'+(t.lbl?'var(--border)':'var(--border-s)')+'"></div>'+(t.lbl?'<div style="position:absolute;top:'+((t.m-openB)/BLOCK*ROW_H)+'px;right:6px;transform:translateY(-50%);font-size:9.5px;color:var(--gold);font-weight:600;white-space:nowrap">'+t.lbl+'</div>':'')).join('')+'</div>';
    const roomCols=activeRooms.map(rm=>{
      const sh=byRoom[rm].map(s=>{
        const top=(toM(s.time_start)-openB)/BLOCK*ROW_H;
        const h2=Math.max(ROW_H,(toM(s.time_end)-toM(s.time_start))/BLOCK*ROW_H);
        const _sty=s.style||(S.groups.find(gg=>gg.id===s.group||gg.name===s.group)?.styles||[])[0]||'';
        const bar = s._isClass ? 'var(--purple)' : (SC[_sty]||'var(--muted)');
        const bg  = s._isClass ? 'var(--s3)' : 'var(--s2)';
        const nameColor = s._isClass ? 'var(--purple)' : 'var(--text)';
        const rosterKey = (s.group||'').replace(/'/g, "\\'");
        const nameFontSize = h2 < 24 ? '9px' : h2 < 36 ? '10px' : '10.5px';
        const showSubtitle = h2 >= 22;
        const subtitleFontSize = h2 < 36 ? '9px' : '9.5px';
        const blockPad = h2 < 24 ? '2px 5px' : '4px 7px';
        const sessData = encodeURIComponent(JSON.stringify({
          group: s.group, date: day.date, room: rm,
          time_start: s.time_start, time_end: s.time_end,
          origRoom: rm
        }));
        return '<div draggable="true" data-sess="'+sessData+'"'
          +' onmouseenter="hideSchedTip()"'
          +' ondragstart="schedDragStart(event)" ondragend="schedDragEnd(event)"'
          +' onmouseover="showSchedTip(event,\''+rosterKey+'\')" onmousemove="positionSchedTip(event)" onmouseout="hideSchedTip()"'
          +' style="position:absolute;top:'+top+'px;left:0;right:0;height:'+h2+'px;box-sizing:border-box;border-left:3px solid '+bar+';border-bottom:1px solid var(--border-s);background:'+bg+';padding:'+blockPad+';overflow:hidden;z-index:1;cursor:grab;user-select:none">'
          +'<div style="font-size:'+nameFontSize+';font-weight:700;color:'+nameColor+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(s.group||'').replace(/_/g,' ')+'</div>'
          +(showSubtitle?'<div style="font-size:'+subtitleFontSize+';color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(s.instructor||'')+(s.dancer_count?' · '+s.dancer_count+'p':'')+'</div>':'')
          +(h2>42&&s.notes?'<div style="font-size:9px;color:var(--faint);font-style:italic">'+s.notes+'</div>':'')
          +'</div>';
      }).join('');
      return '<div data-room="'+rm+'" data-open="'+openB+'" data-rowh="'+ROW_H+'" data-date="'+(day.date||'')+'" data-day="'+(day.day||'')+'"'
        +' ondragover="schedDragOver(event)" ondragleave="schedDragLeave(event)" ondrop="schedDrop(event)"'
        +' style="position:relative;width:'+roomW+'px;height:'+(totalB*ROW_H)+'px;flex-shrink:0;border-right:1px solid var(--border-s)">'+sh+'</div>';
    }).join('');
    return '<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden"><div style="display:flex;background:var(--s2);border-bottom:1px solid var(--border)"><div style="width:'+colW+'px;flex-shrink:0;padding:6px 8px;font-size:9px;color:var(--faint);text-align:right;border-right:1px solid var(--border-s)">15 min</div>'+activeRooms.map(rm=>'<div style="width:'+roomW+'px;flex-shrink:0;padding:6px 8px;font-size:10.5px;font-weight:700;color:'+(rm===CLASS_COL?'var(--purple)':'var(--sky)')+';text-align:center;text-transform:uppercase;letter-spacing:.04em;border-right:1px solid var(--border-s)">'+rm+'</div>').join('')+'</div><div style="display:flex;overflow-x:auto">'+timeAxis+roomCols+'</div></div>';
  }

  return weekNums.map(wk=>{
    const wkDays=[...byWeek[wk]].sort((a,b)=>DAY_ORDER.indexOf(a.day)-DAY_ORDER.indexOf(b.day));
    const pid='swk'+wk;
    // Week label — use the date range of this week's days
    const dates=wkDays.map(d=>d.date).filter(Boolean).sort();
    const wkLabel=weekNums.length>1
      ? (dates.length ? new Date(dates[0]+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+new Date(dates[dates.length-1]+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'Week '+wk)
      : (dates.length ? new Date(dates[0]+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+' weekend' : 'This weekend');
    // Day tabs
    const tabs=wkDays.map((d,i)=>{
      const lbl=d.day+(d.date?' · '+new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'');
      const active=i===0;
      return '<button id="'+pid+'t'+i+'" onclick="switchDayWeek(\''+pid+'\','+i+')" style="padding:6px 14px;font-size:11px;background:'+(active?'var(--s2)':'transparent')+';border:none;border-radius:var(--r) var(--r) 0 0;color:'+(active?'var(--text)':'var(--faint)')+';cursor:pointer;font-weight:'+(active?'600':'400')+'">'+lbl+'</button>';
    }).join('');
    const panels=wkDays.map((d,i)=>'<div id="'+pid+'p'+i+'" style="display:'+(i===0?'block':'none')+'">'+renderGrid(d)+'</div>').join('');
    return '<div style="margin-bottom:24px"><div style="display:flex;align-items:flex-end;gap:2px;border-bottom:2px solid var(--gold)"><div style="padding:7px 16px;background:var(--gold);color:#1A1A24;font-size:11.5px;font-weight:700;letter-spacing:.04em;border-radius:var(--r) var(--r) 0 0">'+wkLabel+'</div>'+tabs+'</div>'+panels+'</div>';
  }).join('');
})()}
<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
