<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Scheduler v1.0.0</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060b;
  --s1:#0d0d17;
  --s2:#131320;
  --s3:#1a1a2c;
  --s4:#222238;
  --border:#252540;
  --border-s:rgba(37,37,64,.55);
  --gold:#e8a820;
  --gold-lt:#f5c860;
  --gold-d:rgba(232,168,32,.1);
  --gold-glow:rgba(232,168,32,.2);
  --teal:#3ec4a4;
  --purple:#9b7ee8;
  --rose:#e06464;
  --green:#52c478;
  --sky:#4aaee8;
  --text:#ede8df;
  --muted:#9490ac;
  --faint:#4a4664;
  --r:8px;--rl:14px;
  --fd:'Fraunces',Georgia,serif;
  --fb:'Plus Jakarta Sans',system-ui,sans-serif
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:13.5px;line-height:1.5;overflow:hidden}
/* Subtle noise texture on body */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:1}
#app{display:flex;height:100vh}
.sidebar{width:210px;background:linear-gradient(180deg,var(--s1) 0%,#0a0a14 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(232,168,32,.15) 40%,rgba(232,168,32,.08) 70%,transparent)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;position:relative}
.logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-t{font-family:var(--fd);font-size:19px;font-weight:300;color:var(--gold);font-style:italic;line-height:1.1;letter-spacing:.01em}
.logo-s{font-size:9px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.ng-label{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.12em;padding:0 10px;margin-bottom:4px;margin-top:12px}
.nb{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--muted);border:none;background:none;width:100%;text-align:left;font-size:12.5px;font-family:var(--fb);transition:all .15s;position:relative}
.nb:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nb.active{background:linear-gradient(90deg,rgba(232,168,32,.12),rgba(232,168,32,.04));color:var(--gold)}
.nb.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:18px;background:linear-gradient(180deg,var(--gold-lt),var(--gold));border-radius:2px;box-shadow:0 0 8px var(--gold-glow)}
.ni{font-size:14px;width:18px;text-align:center}.nbadge{margin-left:auto;background:var(--gold);color:#06060b;border-radius:100px;font-size:10px;font-weight:700;padding:1px 6px}
.nbadge.red{background:var(--rose);color:#fff}
.sf{padding:10px 14px;border-top:1px solid var(--border)}
.lm-s{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:all .3s}
.dot.on{background:var(--green);box-shadow:0 0 8px rgba(82,196,120,.5)}.dot.err{background:var(--rose)}
.lm-test{background:none;border:none;color:var(--faint);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:3px;transition:all .15s}
.lm-test:hover{color:var(--gold);background:var(--gold-d)}
.ph{padding:22px 28px 0;background:linear-gradient(180deg,var(--s1),transparent);border-bottom:1px solid var(--border);flex-shrink:0}
.pt{font-family:var(--fd);font-size:24px;font-weight:300;font-style:italic;color:var(--text);letter-spacing:.01em}
.pd{color:var(--muted);font-size:12px;margin-top:2px}
.tabs{display:flex;margin-top:14px}
.tab{padding:7px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-size:12.5px;font-family:var(--fb);transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.pb{padding:22px 28px;flex:1}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;transition:border-color .2s}
.card:hover{border-color:rgba(37,37,64,.9)}
.cl{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;transition:all .2s;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,168,32,.2),transparent);opacity:0;transition:opacity .2s}
.stat:hover::before{opacity:1}
.stat:hover{border-color:rgba(232,168,32,.2)}
.stat-n{font-family:var(--fd);font-size:38px;color:var(--gold);line-height:1;font-weight:300;letter-spacing:-.01em}
.stat-l{font-size:11px;color:var(--muted);margin-top:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.stat-d{font-size:10.5px;color:var(--faint);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--s2);color:var(--text);cursor:pointer;font-size:12.5px;font-family:var(--fb);transition:all .15s;font-weight:400}
.btn:hover{background:var(--s3);border-color:rgba(232,168,32,.3)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,var(--gold),#d49010);color:#06060b;border-color:var(--gold);font-weight:600;box-shadow:0 2px 12px rgba(232,168,32,.2)}
.btn-p:hover{background:linear-gradient(135deg,var(--gold-lt),var(--gold));border-color:var(--gold-lt);color:#06060b;box-shadow:0 4px 18px rgba(232,168,32,.3)}
.btn-g{background:none;border-color:transparent;color:var(--muted)}.btn-g:hover{background:rgba(255,255,255,.04);border-color:var(--border);color:var(--text)}
.btn-d{color:var(--rose);border-color:transparent;background:none}.btn-d:hover{background:rgba(224,100,100,.08);border-color:var(--rose)}
.btn-sm{padding:4px 10px;font-size:11.5px}.btn-xs{padding:2px 7px;font-size:11px}
input,select,textarea{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--fb);font-size:13px;padding:6px 10px;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,168,32,.08)}
input[type=checkbox]{width:auto;accent-color:var(--gold);width:14px;height:14px}
input[type=number]{width:auto}
select option{background:var(--s2)}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:500}
.fg{margin-bottom:12px}.frow{display:grid;gap:12px}.frow.c2{grid-template-columns:1fr 1fr}.frow.c3{grid-template-columns:1fr 1fr 1fr}
.tw{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--s2)}th{text-align:left;padding:7px 11px;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
td{padding:8px 11px;border-top:1px solid var(--border-s);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}.tr-selected td{background:rgba(232,168,32,.06)!important}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:10.5px;font-weight:500;margin:1px 2px;white-space:nowrap}
.t-ballet{background:rgba(62,196,164,.1);color:var(--teal);border:1px solid rgba(62,196,164,.2)}
.t-contemp{background:rgba(155,126,232,.1);color:var(--purple);border:1px solid rgba(155,126,232,.2)}
.t-modern{background:rgba(232,168,32,.1);color:var(--gold);border:1px solid rgba(232,168,32,.2)}
.t-affect{background:rgba(224,100,100,.1);color:var(--rose);border:1px solid rgba(224,100,100,.2)}
.t-tap{background:rgba(82,196,120,.1);color:var(--green);border:1px solid rgba(82,196,120,.2)}
.t-sl1{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.t-sl2{background:rgba(74,174,232,.1);color:var(--sky);border:1px solid rgba(74,174,232,.2)}
.t-sl3{background:rgba(155,126,232,.1);color:var(--purple);border:1px solid rgba(155,126,232,.2)}
.t-sl4{background:rgba(232,168,32,.1);color:var(--gold);border:1px solid rgba(232,168,32,.2)}
.t-sl5{background:rgba(224,100,100,.1);color:var(--rose);border:1px solid rgba(224,100,100,.2)}
.t-flag{background:rgba(224,100,100,.1);color:var(--rose);border:1px solid rgba(224,100,100,.22);font-size:10px}
.t-ovld{background:rgba(224,100,100,.12);color:var(--rose);border:1px solid rgba(224,100,100,.28);font-size:10px}
.rule-row{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.rp{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.rp-hard{background:rgba(224,100,100,.12);color:var(--rose)}.rp-soft{background:rgba(232,168,32,.12);color:var(--gold)}
.gs-active{background:rgba(82,196,120,.1);color:var(--green);border:1px solid rgba(82,196,120,.22)}
.gs-needs_work{background:rgba(232,168,32,.1);color:var(--gold);border:1px solid rgba(232,168,32,.22)}
.gs-ready{background:rgba(74,174,232,.1);color:var(--sky);border:1px solid rgba(74,174,232,.22)}
.gs-hold{background:rgba(255,255,255,.04);color:var(--faint);border:1px solid var(--border)}
.vt-tier1{background:rgba(155,126,232,.1);color:var(--purple);border:1px solid rgba(155,126,232,.22)}
.vt-tier2{background:rgba(74,174,232,.1);color:var(--sky);border:1px solid rgba(74,174,232,.22)}
.rule-text{font-size:12.5px;flex:1;line-height:1.5}.rule-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:17px;line-height:1;padding:0 3px;flex-shrink:0;transition:color .15s}.rule-del:hover{color:var(--rose)}
.dz{border:2px dashed var(--border);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;transition:all .2s;color:var(--muted)}
.dz:hover,.dz.over{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}
.ai-log{background:var(--s2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;font-size:11.5px;font-family:'Courier New',monospace;line-height:1.7;max-height:400px;overflow-y:auto;color:var(--muted);white-space:pre-wrap;word-break:break-word}
.pb-bar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:6px}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:2px;transition:width .5s}
.conf-row{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:rgba(224,100,100,.05);border:1px solid rgba(224,100,100,.18);border-radius:var(--r);margin-bottom:6px;font-size:12.5px}
.day-col{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.day-head{padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--border);font-size:10.5px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.07em}
.sess-blk{padding:9px 12px;border-top:1px solid var(--border-s);position:relative;padding-left:15px}
.sess-bar{position:absolute;left:0;top:0;bottom:0;width:3px}
.sess-time{font-size:10px;color:var(--muted);margin-bottom:2px}.sess-grp{font-size:13px;font-weight:600;margin-bottom:2px}.sess-meta{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-ico{font-size:32px;margin-bottom:8px}.empty h3{font-weight:400;font-size:15px;margin-bottom:4px}.empty p{font-size:12px;color:var(--faint)}
.tbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sw{position:relative;flex:1;max-width:260px}.sw input{padding-left:30px}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;font-size:13px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:rot .6s linear infinite;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}
.sib-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--purple);margin-right:3px;vertical-align:middle}
#toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--s3);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;font-size:12.5px;animation:tin .18s ease;max-width:280px;pointer-events:all}
.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--rose);color:var(--rose)}.toast.info{border-color:var(--gold);color:var(--gold)}
@keyframes tin{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
/* ── DRAWER ── */
#drawer{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--s1);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#drawer.open{transform:translateX(0)}
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none;backdrop-filter:blur(1px)}
#drawer-overlay.open{display:block}
.dr-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dr-title{font-family:var(--fd);font-size:17px;font-style:italic;color:var(--gold)}
.dr-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0 4px;transition:color .15s}.dr-close:hover{color:var(--text)}
.dr-body{flex:1;overflow-y:auto;padding:18px 20px}
.dr-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
/* ── TOGGLE ── */
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:6px}
.toggle-wrap:hover{border-color:var(--gold-lt)}
.toggle-label{font-size:12.5px;flex:1}
.toggle-sub{font-size:11px;color:var(--faint)}
.tgl{width:34px;height:19px;background:var(--s4);border-radius:10px;position:relative;flex-shrink:0;transition:background .2s;cursor:pointer}
.tgl.on{background:var(--gold)}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;background:#fff;border-radius:50%;transition:transform .2s}
.tgl.on::after{transform:translateX(15px)}
/* ── ROOM CARD EDIT ── */
.rc-edit{position:absolute;inset:0;background:var(--s2);border-radius:var(--rl);padding:14px;z-index:2;display:none}
.room-card-wrap{position:relative}
.room-card-wrap.editing .rc-edit{display:block}
/* ── CHIP INPUT ── */
.chip-wrap{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);min-height:36px;cursor:text}
.chip-wrap:focus-within{border-color:var(--gold)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:11.5px;background:var(--s3);border:1px solid var(--border);color:var(--text)}
.chip-x{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;line-height:1;padding:0;transition:color .15s}.chip-x:hover{color:var(--rose)}
.chip-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--fb);font-size:12.5px;min-width:80px;flex:1}
/* ── STYLE CHECKBOXES ── */
.style-checks{display:flex;flex-wrap:wrap;gap:6px}
.style-cb{display:none}.style-cb:checked+.style-lbl{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}
.style-lbl{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border:1px solid var(--border);border-radius:100px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;user-select:none}
.style-lbl:hover{border-color:var(--muted);color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:var(--border)}
/* ── PRINT ── */
@media print {
  body{background:#fff!important;color:#000!important;overflow:visible!important}
  nav.sidebar,#drawer,#drawer-overlay,#toasts,#sched-tip,.ph .tabs,.tbar,.btn,details>summary~*{display:none!important}
  #app{display:block!important}
  .main{overflow:visible!important}
  .ph{background:#fff!important;border:none!important;padding:12px 0 8px!important}
  .pt{color:#000!important;font-size:18px!important}
  .pd{color:#555!important}
  .pb{padding:0!important}
  /* Grid cells — force light backgrounds */
  [style*="background:var(--s2)"],[style*="background:var(--s1)"],[style*="background:var(--s3)"]{background:#f5f5f5!important}
  [style*="color:var(--text)"]{color:#000!important}
  [style*="color:var(--muted)"]{color:#555!important}
  [style*="color:var(--faint)"]{color:#888!important}
  [style*="background:var(--bg)"]{background:#fff!important}
  /* Grid structural lines */
  [style*="border:1px solid var(--border)"],[style*="border-right:1px solid var(--border-s)"],[style*="border-bottom:1px solid var(--border-s)"]{border-color:#ccc!important}
  /* Session blocks — keep their color accent bars but lighten backgrounds */
  .main [style*="border-left:3px solid"]{background:#f9f9f9!important;color:#111!important}
  /* Page breaks between weeks */
  [id^="swk"]{page-break-after:always}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="app">
<nav class="sidebar">
  <div class="logo">
    <div class="logo-t">Studio<br>Scheduler</div>
    
  </div>
  <div class="nav">
    <div class="ng-label">Overview</div>
    <button class="nb active" onclick="nav('dashboard')" id="nb-dashboard"><span class="ni">◈</span>Dashboard</button>
    <div class="ng-label">Data</div>
    <button class="nb" onclick="nav('roster')" id="nb-roster"><span class="ni">♟</span>Roster<span class="nbadge" id="badge-dancers">0</span></button>
    <button class="nb" onclick="nav('groups')" id="nb-groups"><span class="ni">◎</span>Groups<span class="nbadge" id="badge-groups">0</span></button>
    <button class="nb" onclick="nav('rooms')" id="nb-rooms"><span class="ni">⬡</span>Rooms & Instructors</button>
    <button class="nb" onclick="nav('blocked')" id="nb-blocked"><span class="ni">⊘</span>Class Times<span class="nbadge red" id="badge-blocked">0</span></button>
    <div class="ng-label">Scheduling</div>
    <button class="nb" onclick="nav('schedule')" id="nb-schedule"><span class="ni">◉</span>Generate Schedule</button>
    <div class="ng-label">System</div>
    <button class="nb" onclick="nav('settings')" id="nb-settings"><span class="ni">⚙</span>Settings</button>
  </div>
</nav>
<main class="main" id="main"></main>
</div>

<!-- Drawer -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="dr-head">
    <span class="dr-title" id="dr-title">Edit</span>
    <button class="dr-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="dr-body" id="dr-body"></div>
  <div class="dr-foot" id="dr-foot"></div>

let _tipTimeout = null;
function showSchedTip(e, groupName) {
  clearTimeout(_tipTimeout);
  const tip = g('sched-tip');
  const dancers = S.dancers.filter(d => d.groups.includes(groupName));
  if (!dancers.length) return;

  // Format as "First L."
  const formatted = dancers.map(d => {
    const parts = (d.name || '').trim().split(/\s+/);
    const first = parts[0] || '';
    const lastInit = parts.length > 1 ? parts[parts.length - 1][0] + '.' : '';
    return lastInit ? `${first} ${lastInit}` : first;
  });

  g('sched-tip-group').textContent = groupName.replace(/_/g, ' ');
  g('sched-tip-dancers').innerHTML = formatted.map(n =>
    `<span style="font-size:11.5px;color:var(--text);background:var(--s2);border:1px solid var(--border-s);border-radius:4px;padding:1px 6px">${n}</span>`
  ).join('');
  g('sched-tip-count').textContent = `${dancers.length} dancer${dancers.length !== 1 ? 's' : ''} in this group`;

  positionSchedTip(e);
  tip.style.display = 'block';
}
function positionSchedTip(e) {
  const tip = g('sched-tip');
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  // Keep within viewport
  if (x + 280 > window.innerWidth)  x = e.clientX - 280 - pad;
  if (y + tip.offsetHeight + 20 > window.innerHeight) y = e.clientY - tip.offsetHeight - pad;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideSchedTip() {
  _tipTimeout = setTimeout(() => {
    const tip = g('sched-tip');
    if (tip) tip.style.display = 'none';
  }, 120);
}

// ── Studio folder loader ──────────────────────────────────────────────────
// Expected filenames: studio_dancers.csv, studio_groups.csv,
//                     studio_variations.csv, studio_sdt.csv, studio_performances.csv
//                     studio_rooms.csv, studio_instructors.csv, studio_classes.csv
const STUDIO_FILE_MAP = {
  'studio_dancers.csv':      'dancers',
  'studio_groups.csv':       'groups',
  'studio_variations.csv':   'variations',
  'studio_sdt.csv':          'sdt',
  'studio_performances.csv': 'performances',
  'studio_rooms.csv':        'rooms',
  'studio_instructors.csv':  'instructors',
  'studio_classes.csv':      'classes',
};

function loadStudioFolder() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.csv';
  inp.multiple = true;
  inp.onchange = async e => {
    const files = [...e.target.files];
    const results = {loaded:[], skipped:[]};
    let pending = files.length;
    if(!pending) return;

    const readFile = f => new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res({name: f.name.toLowerCase(), text: ev.target.result});
      r.readAsText(f);
    });

    const allRead = await Promise.all(files.map(readFile));

    for(const {name, text} of allRead) {
      const type = STUDIO_FILE_MAP[name];
      if(!type){ results.skipped.push(name); continue; }
      try {
        if(type === 'dancers')      { parseAndLoadDancers(text);                          results.loaded.push('Dancers'); }
        if(type === 'groups')       { parseAndLoadGroupsWithCategory(text, 'competition'); results.loaded.push('Competition Groups'); }
        if(type === 'variations')   { parseAndLoadGroupsWithCategory(text, 'variation');   results.loaded.push('Variations'); }
        if(type === 'sdt')          { parseAndLoadGroupsWithCategory(text, 'solo_duo_trio');results.loaded.push('Solos/Duos/Trios'); }
        if(type === 'performances') { parseAndLoadGroupsWithCategory(text, 'performance'); results.loaded.push('Performances'); }
        if(type === 'rooms')        { parseAndLoadRooms(text);                             results.loaded.push('Rooms'); }
        if(type === 'instructors')  { parseAndLoadInstructors(text);                       results.loaded.push('Instructors'); }
        if(type === 'classes')      { parseAndLoadClasses(text);                           results.loaded.push('Classes'); }
      } catch(err) { results.skipped.push(name+' (error: '+err.message+')'); }
    }

    render();
    const msg = results.loaded.length
      ? 'Loaded: '+results.loaded.join(', ')+(results.skipped.length?' · Skipped: '+results.skipped.join(', '):'')
      : 'No recognized files found. Expected: '+Object.keys(STUDIO_FILE_MAP).join(', ');
    toast(msg, results.loaded.length?'ok':'err');
  };
  inp.click();
}

// ── Parsers called by folder loader and individual imports ─────────────────
function parseCSVLine(line) {
  const fields=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"'){inQ=false;}else{cur+=c;}}
    else if(c==='"'){inQ=true;}
    else if(c===','){fields.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  fields.push(cur.trim());
  return fields;
}

function parseAndLoadDancers(text) {
  // Delegate to the proven parseCSV which handles all field variants
  const dancers = parseCSV(text);
  if(!dancers.length) throw new Error('No dancers found — check column headers');
  S.dancers = dancers;
  S.filter=''; S.filterGroup=''; S.filterStyle='';
}

// parseAndLoadGroupsWithCategory: loads groups from CSV, forces category to forcedCategory.
// Replaces only groups of that category — other categories are preserved.
// forcedCategory: 'competition' | 'variation' | 'solo_duo_trio' | 'performance'
function parseAndLoadGroupsWithCategory(text, forcedCategory) {
  const lines = text.trim().split(/\r?\n/);
  const hdr = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,''));
  const col = k=>hdr.indexOf(k);
  const newGroups = lines.slice(1).filter(l=>l.trim()).map(line=>{
    const p = parseCSVLine(line);
    const get = k=>{ const i=col(k); return i>=0?(p[i]||'').trim():''; };
    const mc = parseInt(get('member_count'))||0;
    return {
      id:   get('group_id')||get('group_name')||'',
      name: get('group_id')||get('group_name')||'',
      category: forcedCategory, // always use the file-determined category
      type: (()=>{ const mc2=parseInt(get('member_count'))||0; return mc2<=5?'small':mc2<=12?'medium':'large'; })(),
      styles:     (()=>{ const v=(get('dance_styles')||get('primary_styles')||'').trim(); return v?[v.split('|')[0]]:[];})(  ),
      sls:        (get('level_mix')||get('skill_levels')||'').split('|').filter(Boolean),
      memberCount: mc,
      assignedInstructor:  get('assigned_instructor')||'',
      assignedInstructor2: get('assigned_instructor2')||'',
      instr2Logic:         get('instr2_logic')||'AND',
      assignedRoom:        '',
      assignedDay:         get('assigned_day')||'',
      assignedTimeStart:   get('assigned_time_start')||'',
      assignedTimeEnd:     get('assigned_time_end')||'',
      allowedDays:         (get('allowed_days')||'').split('|').filter(Boolean),
      notes:         get('notes')||'',
      status:        get('status')||'active',
      internalNotes: get('internal_notes')||'',
      variationTier: get('variation_tier')||'',
      sessLenMin:    parseInt(get('session_length_min'))||0,
      sessLenMax:    parseInt(get('session_length_min'))||0,
      scene:         get('scene')||'',
    };
  }).filter(g=>g.id);

  // Replace only the groups belonging to this category; preserve all others
  S.groups = [
    ...S.groups.filter(g => (g.category||'competition') !== forcedCategory),
    ...newGroups
  ];
  // Snapshot immediately so S._savedGroupAssignments has fresh styles before applyGroupAssignments fires
  persistStatic();
  setTimeout(applyGroupAssignments, 100);
}

// Legacy wrapper — keeps any existing direct call to parseAndLoadGroups working
function parseAndLoadGroups(text) {
  parseAndLoadGroupsWithCategory(text, 'competition');
}

function parseAndLoadInstructors(text) {

function parseAndLoadClasses(text) {
  // Reuse the same parsing logic as importClassMaster
  const lines = text.trim().split(/\r?\n/);
  const hdr = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,''));
  const col = k=>hdr.indexOf(k);
  const imported = lines.slice(1).filter(l=>l.trim()).map(line=>{
    const p = parseCSVLine(line);
    const get = k=>{ const i=col(k); return i>=0?(p[i]||'').trim():''; };
    const label = get('class_name');
    const day   = get('day');
    const ts    = get('time_start');
    const te    = get('time_end');
    if(!label||!day||!ts||!te) return null;
    const lg = get('level_group')||'';
    const appliesSL = [];
    if(lg.includes('Affect 1-3'))  appliesSL.push('Affect 1','Affect 2','Affect 3');
    if(lg.includes('Affect 4-5'))  appliesSL.push('Affect 4','Affect 5');
    if(lg.includes('Affect 6-8'))  appliesSL.push('Affect 6','Affect 7','Affect 8');
    if(lg.includes('Affect-Pro'))  appliesSL.push('Affect-Pro');
    if(lg.includes('Affect Prep')) appliesSL.push('Affect Prep');
    if(lg.includes('Pre-Pro Prep')) appliesSL.push('Pre-Pro Prep');
    if(lg.includes('Pre-Pro 1-2')) appliesSL.push('Pre-Pro 1','Pre-Pro 1/2','Pre-Pro 2');
    if(lg.includes('Pre-Pro 2-3')) appliesSL.push('Pre-Pro 2','Pre-Pro 2/3','Pre-Pro 3');
    if(lg.includes('Pre-Pro 3-4')) appliesSL.push('Pre-Pro 3','Pre-Pro 4');
    if(lg.includes('Pointe'))      appliesSL.push('Pointe');
    if(lg.includes('Tap 7-8'))     appliesSL.push('Tap 7','Tap 8');
    if(lg.includes('Tap 4-6'))     appliesSL.push('Tap 4','Tap 5','Tap 6');
    if(lg.includes('Tap 1-3'))     appliesSL.push('Tap 1','Tap 2','Tap 3');
    return {
      id: 'CM-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),
      label,
      assignedInstructor: get('instructor')||'',
      day, timeStart:ts, timeEnd:te,
      assignedInstructor: get('instructor')||'',
      assignedRoom:       get('room')||get('assigned_room')||'',
      appliesSL: [...new Set(appliesSL)],
      appliesGroups: [],
      recurrence: 'weekly',
      notes: lg
    };
  }).filter(Boolean);
  if(!imported.length) throw new Error('No classes found — check column headers');
  S.blockedTimes = imported;
}

function renderRoster() {
  const allGroups = [...new Set(S.dancers.flatMap(d=>d.groups))].sort();
  let filtered = S.dancers.filter(d=>{
    const q = S.filter.toLowerCase();
    return (!q||d.name.toLowerCase().includes(q)||d.id.toLowerCase().includes(q))
      &&(!S.filterGroup||d.groups.includes(S.filterGroup))
      &&(!S.filterStyle||d.styles.includes(S.filterStyle));
  });

  g('main').innerHTML = `
<div class="ph">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><div class="pt">Roster</div><div class="pd">${S.dancers.length} dancers · click any row to edit</div></div>
    <div style="display:flex;gap:8px;padding-top:4px">
      <button class="btn btn-sm" onclick="exportCSV()">⇣ CSV</button>
      <button class="btn btn-sm" onclick="showImportZone()">⇡ Import CSV</button>
      <button class="btn btn-p btn-sm" onclick="openAddDancer()">+ Add dancer</button>
    </div>
  </div>
  <div class="tabs"><button class="tab active">Dancers</button></div>
</div>
<div class="pb">
  <div id="import-zone" style="display:none;margin-bottom:16px">
    <div class="dz" id="dz" onclick="g('csv-in').click()" ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDL(event)">
      <div style="font-size:24px;margin-bottom:6px">⇡</div>
      <div style="font-size:13.5px">Drop CSV here or click to browse</div>
      <div style="font-size:11px;color:var(--faint);margin-top:4px">Accepts dancers_full.csv — or any legacy dancer CSV</div>
    </div>
    <input type="file" id="csv-in" accept=".csv" style="display:none" onchange="loadCSV(event)">
  </div>
  <div class="tbar">
    <div class="sw"><span class="si">⌕</span><input id="roster-search" placeholder="Search name or ID…" value="${S.filter}" oninput="S.filter=this.value;updateRosterTbody()"></div>
    <select style="width:150px" onchange="S.filterGroup=this.value;updateRosterTbody()">
      <option value="">All groups</option>
      ${allGroups.map(g=>`<option value="${g}" ${S.filterGroup===g?'selected':''}>${g.replace(/_/g,' ')}</option>`).join('')}
    </select>
    <select style="width:120px" onchange="S.filterStyle=this.value;updateRosterTbody()">
      <option value="">All styles</option>
      ${STYLES.map(s=>`<option value="${s}" ${S.filterStyle===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <span style="color:var(--muted);font-size:12px;margin-left:auto" id="roster-count">${filtered.length} shown</span>
  </div>
  ${S.dancers.length===0?`<div class="empty"><div class="empty-ico">⇡</div><h3>No dancers loaded</h3><p>Import a CSV or add dancers manually.</p></div>`:`
  <div class="tw">
    <table><thead><tr>
      <th>ID</th><th>Name</th><th>Age</th><th>Skill Level</th><th>Styles</th><th>Groups</th><th># Groups</th><th>Hrs/Wk</th><th>Tags</th>
    </tr></thead>
    <tbody>
      ${filtered.map(d=>{
        const flags=[];
        if(d.age<=12) flags.push('<span class="tag t-flag">≤12</span>');
        if(isOverloaded(d)) flags.push('<span class="tag t-ovld">overloaded</span>');
        const groupCount = d.group_count||d.groups.length;

        // Compute scheduled hours from generated schedule, fallback to CSV value
        let schedMins = 0;
        if(S.schedule?.schedule) {
          S.schedule.schedule.forEach(day=>{
            (day.sessions||[]).forEach(s=>{
              if(d.groups.includes(s.group)) {
                const[sh,sm]=(s.time_start||'0:00').split(':').map(Number);
                const[eh,em]=(s.time_end||'0:00').split(':').map(Number);
                schedMins += Math.max(0,(eh*60+em)-(sh*60+sm));
              }
            });
          });
        }
        // If multi-week schedule, divide by number of weeks
        const numWks = S.schedParams.multiWeekend ? (S.schedParams.numWeekends||1) : 1;
        const schedHrs = schedMins > 0 ? (schedMins/60/numWks).toFixed(1) : null;
        const csvHrs   = d.weekly_req_hours > 0 ? d.weekly_req_hours.toFixed(1) : null;
        const hrsVal   = schedHrs || csvHrs;
        const hrsNum   = parseFloat(hrsVal)||0;
        const hrsColor = hrsNum>=10?'var(--rose)':hrsNum>=6?'var(--gold)':'var(--muted)';
        const hrsSrc   = schedHrs ? '' : csvHrs ? ' style="opacity:.6" title="From CSV — generate schedule for live count"' : '';
        // Hours overloaded: scheduled hrs > age (1hr per year of age standard)
        if(hrsNum > 0 && d.age > 0 && hrsNum > d.age) {
          flags.push(`<span class="tag t-ovld" title="Standard: ${d.age}h/wk for age ${d.age} · Scheduled: ${hrsNum}h/wk">hrs overloaded</span>`);
        }

        return `<tr style="cursor:pointer" onclick="openEditDancer('${d.id}')" title="Click to edit ${d.name}">
          <td style="color:var(--faint);font-size:11px">${d.id}</td>
          <td><strong>${d.name}</strong></td>
          <td style="font-size:11.5px;text-align:center;color:var(--muted)">${d.age||'—'}</td>
          <td><span class="tag t-${(d.sl||'').toLowerCase().replace(/\s+/g,'-')}">${d.sl||'—'}</span></td>
          <td>${d.styles.map(stTag).join('')}</td>
          <td style="font-size:11.5px;max-width:180px">${d.groups.map(g=>`<span style="display:inline-block;color:var(--muted);font-size:10.5px;margin-right:4px">${g.replace(/_/g,' ')}</span>`).join('')}</td>
          <td style="text-align:center;font-size:12px;color:${groupCount>=5?'var(--rose)':groupCount>=2?'var(--gold)':'var(--muted)'};font-weight:${groupCount>=2?'600':'400'}">${groupCount}</td>
          <td style="text-align:center;font-size:12px;font-weight:600;color:${hrsColor}"${hrsSrc}>${hrsVal ? hrsVal+'h' : '<span style="color:var(--faint)">—</span>'}</td>
          <td>${flags.join('') || '<span style="color:var(--faint)">—</span>'}</td>
        </tr>`;
      }).join('')}
    </tbody></table>
  </div>`}
</div>`;
}

function showImportZone() {
  const z = g('import-zone');
  if (z) z.style.display = z.style.display==='none'?'block':'none';
}

function updateRosterTbody() {
  // Targeted update — only re-renders the table body and count, preserving search input focus
  const tbody = document.querySelector('#main tbody');
  const countEl = g('roster-count');
  if (!tbody) { renderRoster(); return; } // fallback if table not present yet
  const filtered = S.dancers.filter(d => {
    const q = S.filter.toLowerCase();
    return (!q || d.name.toLowerCase().includes(q) || d.id.toLowerCase().includes(q))
      && (!S.filterGroup || d.groups.includes(S.filterGroup))
      && (!S.filterStyle || d.styles.includes(S.filterStyle));
  });
  if (countEl) countEl.textContent = filtered.length + ' shown';
  tbody.innerHTML = filtered.map(d => {
    const flags = [];
    if (d.age <= 12) flags.push('<span class="tag t-flag">≤12</span>');
    if (isOverloaded(d)) flags.push('<span class="tag t-ovld">overloaded</span>');
    const groupCount = d.group_count || d.groups.length;
    let schedMins = 0;
    if (S.schedule?.schedule) {
      S.schedule.schedule.forEach(day => (day.sessions || []).forEach(s => {
        if (d.groups.includes(s.group)) {
          const [sh, sm] = (s.time_start || '0:00').split(':').map(Number);
          const [eh, em] = (s.time_end || '0:00').split(':').map(Number);
          schedMins += Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
        }
      }));
    }
    const numWks = S.schedParams.multiWeekend ? (S.schedParams.numWeekends || 1) : 1;
    const schedHrs = schedMins > 0 ? (schedMins / 60 / numWks).toFixed(1) : null;
    const csvHrs = d.weekly_req_hours > 0 ? d.weekly_req_hours.toFixed(1) : null;
    const hrsVal = schedHrs || csvHrs;
    const hrsNum = parseFloat(hrsVal) || 0;
    const hrsColor = hrsNum >= 10 ? 'var(--rose)' : hrsNum >= 6 ? 'var(--gold)' : 'var(--muted)';
    const hrsSrc = schedHrs ? '' : csvHrs ? ' style="opacity:.6" title="From CSV"' : '';
    if (hrsNum > 0 && d.age > 0 && hrsNum > d.age)
      flags.push(`<span class="tag t-ovld" title="Standard: ${d.age}h/wk · Scheduled: ${hrsNum}h/wk">hrs overloaded</span>`);
    const safeId = d.id.replace(/'/g, "\\'");
    return `<tr style="cursor:pointer" onclick="openEditDancer('${safeId}')" title="Edit ${d.name}">
      <td style="color:var(--faint);font-size:11px">${d.id}</td>
      <td><strong>${d.name}</strong></td>
      <td style="font-size:11.5px;text-align:center;color:var(--muted)">${d.age||'—'}</td>
      <td><span class="tag t-${(d.sl || '').toLowerCase().replace(/\s+/g, '-')}">${d.sl || '—'}</span></td>
      <td>${d.styles.map(stTag).join('')}</td>
      <td style="font-size:11.5px;max-width:180px">${d.groups.map(gr => `<span style="display:inline-block;color:var(--muted);font-size:10.5px;margin-right:4px">${gr.replace(/_/g, ' ')}</span>`).join('')}</td>
      <td style="text-align:center;font-size:12px;color:${groupCount >= 5 ? 'var(--rose)' : groupCount >= 2 ? 'var(--gold)' : 'var(--muted)'};font-weight:${groupCount >= 2 ? '600' : '400'}">${groupCount}</td>
      <td style="text-align:center;font-size:12px;font-weight:600;color:${hrsColor}"${hrsSrc}>${hrsVal ? hrsVal + 'h' : '<span style="color:var(--faint)">—</span>'}</td>
      <td>${flags.join('') || '<span style="color:var(--faint)">—</span>'}</td>
    </tr>`;
  }).join('');
}

function selectDancerSchoolLevel(levelId, clickedLabel) {
  // Highlight selected pill
  document.querySelectorAll('.school-lvl-lbl').forEach(l => {
    l.style.borderColor = ''; l.style.color = ''; l.style.background = '';
  });
  if (clickedLabel) {
    clickedLabel.style.borderColor = 'var(--gold)';
    clickedLabel.style.color = 'var(--gold)';
    clickedLabel.style.background = 'var(--gold-d)';
  }
  // Show/hide level time panel
  const panel = g('df-level-time-panel');
  if (panel) panel.style.display = levelId ? '' : 'none';
  SCHOOL_LEVELS.forEach(lvl => {
    const p = g('df-lvl-panel-' + lvl.id);
    if (p) p.style.display = lvl.id === levelId ? '' : 'none';
  });
}

function updateLevelDismissal(levelId, newTime) {
  S.schoolDismissalTimes[levelId] = newTime;
  persistStatic();
  // Update any other open instances of this field
  const inp = g('df-lvl-time-' + levelId);
  if (inp) inp.value = newTime;
  toast(`${SCHOOL_LEVELS.find(l=>l.id===levelId)?.label||levelId} dismissal updated to ${newTime} for all students`, 'ok');
}

function updateVariationTierTime(tierId, mins) {
  S.variationTierTimes[tierId] = mins;
  persistStatic();
  toast(`${tierId === 'tier1' ? 'Tier 1' : 'Tier 2'} rehearsal time updated to ${mins} min for all variations`, 'ok');
}

function updateSkillLevelDaysOff(sl, day, checked) {
  if(!S.skillLevelDaysOff[sl]) S.skillLevelDaysOff[sl] = [];
  if(checked) {
    if(!S.skillLevelDaysOff[sl].includes(day)) S.skillLevelDaysOff[sl].push(day);
  } else {
    S.skillLevelDaysOff[sl] = S.skillLevelDaysOff[sl].filter(d => d !== day);
  }
  persistStatic();
}

function addOvrRow() {
  const list = g('df-overrides-list');
  if (!list) return;
  const i = list.querySelectorAll('[id^="df-ovr-day-"]').length;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:5px';
  row.id = 'df-ovr-' + i;
  row.innerHTML = `

      ${['Monday','Tuesday','Wednesday','Thursday','Friday'].map(d=>`<option value="${d}">${d}</option>`).join('')}
    </select>

    <label style="display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--muted);cursor:pointer;white-space:nowrap">

    </label>
    <button class="btn btn-xs btn-d" onclick="removeOvrRow(${i})" style="padding:2px 7px">✕</button>`;

function removeOvrRow(i) {
  const row = g('df-ovr-' + i);
  if (row) row.remove();
}

function toggleOvrOffSchool(i) {
  const cb = g('df-ovr-off-' + i);
  const ti = g('df-ovr-time-' + i);
  if (!cb || !ti) return;
  ti.disabled = cb.checked;
  if (cb.checked) ti.value = '';
}

function readOvrRows() {
  const list = g('df-overrides-list');
  if (!list) return [];
  const overrides = [];
  list.querySelectorAll('[id^="df-ovr-day-"]').forEach(sel => {
    const idx = sel.id.replace('df-ovr-day-', '');
    const day = sel.value;
    const offCb = g('df-ovr-off-' + idx);
    const timeIn = g('df-ovr-time-' + idx);
    const offSchool = offCb?.checked || false;
    const time = offSchool ? '' : (timeIn?.value || '');
    if (day) overrides.push({ day, time, offSchool });
  });
  return overrides;
}

function toggleGroupChip(gr) {
  const inp = g('df-groups');
  let groups = inp.value ? inp.value.split('|').map(x=>x.trim()).filter(Boolean) : [];
  if (groups.includes(gr)) { groups = groups.filter(x=>x!==gr); }
  else { groups.push(gr); }
  inp.value = groups.join('|');
  // Update chip styles
  const key = 'gc-' + gr.replace(/\W/g,'_');
  const btn = g(key);
  if (btn) {
    const active = groups.includes(gr);
    btn.style.borderColor = active?'var(--gold)':'';
    btn.style.color = active?'var(--gold)':'';
    btn.style.background = active?'var(--gold-d)':'';
  }
}

function promptNewGroup() {
  const name = prompt('New group name (use underscores for spaces, e.g. Jazz_Seniors):');
  if (!name) return;
  const inp = g('df-groups');
  let groups = inp.value ? inp.value.split('|').map(x=>x.trim()).filter(Boolean) : [];
  if (!groups.includes(name)) groups.push(name);
  inp.value = groups.join('|');
  toast('Group "' + name + '" added', 'ok');
}

function importRoomsCSV() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.csv';
  inp.onchange = e => {
    const r = new FileReader();
    r.onload = ev => {
      try {
        const lines = ev.target.result.trim().split('\n');
        const hdr = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z_]/g,''));
        const col = k=>hdr.indexOf(k);
        const imported = lines.slice(1).filter(l=>l.trim()).map((line,i)=>{
          const p = line.split(',').map(x=>x.trim().replace(/^"|"$/g,''));
          const get = k=>(p[col(k)]||'').trim();
          const name = get('name');
          if(!name) return null;
          return {
            id:     get('room_id')||'R'+String(i+1).padStart(2,'0'),
            name,
            styles: (get('allowed_styles')||get('styles')||'').split('|').filter(Boolean),
            maxOcc: parseInt(get('max_occupancy')||get('maxocc'))||25,
            note:   get('notes')||get('note')||''
          };
        }).filter(Boolean);
        S.rooms = imported;
        toast('Loaded '+imported.length+' rooms','ok');
        renderRoomsTab();
      } catch(err) { toast('CSV error: '+err.message,'err'); }
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}

function cycleGroupStatus(id) {
  const gr = S.groups.find(x=>x.id===id);
  if(!gr) return;
  const cycle = ['active','needs_work','ready','hold'];
  const cur = cycle.indexOf(gr.status||'active');
  gr.status = cycle[(cur+1) % cycle.length];
  persistStatic();
  renderGroups();
}

function toggleGroupStyle(id, style) {
  const gr = S.groups.find(x=>x.id===id);
  if(!gr) return;
  // Single-select: clicking the active style deselects it, clicking another replaces it
  if((gr.styles||[]).includes(style)) {
    gr.styles = [];           // deselect
  } else {
    gr.styles = [style];      // select only this one
  }
  persistStatic();
  renderGroups();
}

function quickAssignGroup(id, field, value) {
  const gr = S.groups.find(x=>x.id===id);
  if(!gr) return;
  if(field==='instructor') gr.assignedInstructor = value;
  if(field==='room')       gr.assignedRoom = value;
  if(field==='scene')      gr.scene = value;
  if(field==='type')             gr.type = value;
  if(field==='assignedDay')         gr.assignedDay = value;
  if(field==='assignedTimeStart')   gr.assignedTimeStart = value;
  if(field==='assignedTimeEnd')     gr.assignedTimeEnd = value;
  if(field==='assignedInstructor2') gr.assignedInstructor2 = value;
  if(field==='instr2Logic')         { gr.instr2Logic = value; persistStatic(); renderGroups(); return; }
  if(field==='category')            { gr.category = value; persistStatic(); renderGroups(); return; }
  if(field==='name')        { gr.name = value.trim().replace(/\s+/g,'_'); gr.id = gr.id||gr.name; }
  persistStatic();
  const banner = document.querySelector('[style*="rgba(229,162,32,.08)"]');
  const unassigned = S.groups.filter(g=>!g.assignedInstructor).length;
  if(banner) banner.querySelector('span').textContent = `⚡ ${unassigned} group(s) have no instructor assigned — assign below before generating`;
}

function openEditGroup(id) {
  const gr = S.groups.find(x=>x.id===id);
  if(!gr) return;
  openDrawer('Edit group — '+gr.name.replace(/_/g,' '), groupForm(gr), null, ()=>saveGroup(id));
}

function saveGroup(id) {
  const name = g('gf-name').value.trim().replace(/\s+/g,'_');
  if(!name) return toast('Name required','err');
  const styleVal = g('gf-style-hidden')?.value; const styles = styleVal ? [styleVal] : [];
  const sls = SL_OPTS.filter(sl=>g('gsl-'+sl)?.checked);
  const targetReh = parseInt(g('gf-target').value)||8;
  const minReh = parseInt(g('gf-min').value)||6;
  const maxReh = parseInt(g('gf-max').value)||12;
  const type = g('gf-type').value;
  const notes = g('gf-notes').value.trim();
  const scene = g('gf-scene')?.value.trim() || '';
  const status = document.querySelector('input[name="gf-status"]:checked')?.value || 'active';
  const internalNotes = g('gf-inotes')?.value.trim() || '';
  const variationTier = document.querySelector('input[name="gf-vtier"]:checked')?.value || '';
  const assignedInstructor  = g('gf-instr')?.value  || '';
  const assignedInstructor2 = g('gf-instr2')?.value || '';
  const assignedRoom = '';
  const allDaysCheck = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const allowedDays = allDaysCheck.filter(d=>g('gday-'+d)?.checked);
  if(id) {
    const idx = S.groups.findIndex(x=>x.id===id);

function exportGroupsCSV() {
  if(!S.groups.length) return toast('No groups to export','err');

                  'assigned_instructor','assigned_instructor2',
                  'instr2_logic','assigned_day','assigned_time_start','assigned_time_end',

  const makeRows = groups => groups.map(g=>[

    (g.styles||[])[0]||'', (g.sls||[]).join('|'),

    g.instr2Logic||'AND', g.assignedDay||'',
    g.assignedTimeStart||'', g.assignedTimeEnd||'',

    (g.internalNotes||'').replace(/,/g,';'),
    g.variationTier||'',
    g.sessLenMin||'',
    (g.scene||'').replace(/,/g,';')
  ].map(v=>{ const s=String(v); return s.includes(',')?'"'+s+'"':s; }).join(','));

  // Export one file per category that has groups
  const catFiles = [

function importBlockedCSV() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.csv';
  inp.onchange = e => {
    const r = new FileReader();
    r.onload = ev => {
      try {
        const lines = ev.target.result.trim().split(/\r?\n/);
        const hdr = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,''));
        const col = k=>hdr.indexOf(k);
        // RFC-4180 CSV field parser — handles quoted fields with embedded commas/newlines
        function parseCSVLine(line) {
          const fields = []; let cur = '', inQ = false, i = 0;
          for(; i<line.length; i++) {
            const c = line[i];
            if(inQ) { if(c==='"' && line[i+1]==='"') { cur+='"'; i++; } else if(c==='"') { inQ=false; } else { cur+=c; } }
            else if(c==='"') { inQ=true; }
            else if(c===',') { fields.push(cur.trim()); cur=''; }
            else { cur+=c; }
          }
          fields.push(cur.trim());
          return fields;
        }
        const imported = lines.slice(1).filter(l=>l.trim()).map(line=>{
          const p = parseCSVLine(line);
          const get = k=>{ const i=col(k); return i>=0?(p[i]||'').trim():''; };
          const label = get('class_name')||get('label')||get('name');
          if(!label) return null;
          return {
            id: get('block_id')||'B'+Date.now()+Math.random().toString(36).slice(2,5),
            label,
            assignedInstructor: get('instructor')||get('assigned_instructor')||'',
            assignedRoom:       get('room')||get('assigned_room')||'',
            day: get('day')||'Monday',
            timeStart: get('time_start')||get('start_time')||'16:00',
            timeEnd: get('time_end')||get('end_time')||'17:00',
            appliesSL: (get('applies_to_sl')||get('level_group')||'').split('|').filter(Boolean),
            appliesGroups: (get('applies_to_groups')||'').split('|').filter(Boolean),
            recurrence: get('recurrence')||'weekly',
            notes: get('notes')||get('level_group')||''
          };
        }).filter(Boolean);
        S.blockedTimes = imported;
        toast('Loaded '+imported.length+' blocked times','ok'); renderBlocked();
      } catch(err) { toast('CSV error: '+err.message,'err'); }
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}

function renderFreeTime(b) {
  const toM = t => { const [h,m]=(t||'00:00').split(':').map(Number); return h*60+m; };
  const fmt  = m => String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
  const days = S.schedule.schedule||[];
  const rooms = S.rooms.map(r=>r.name);
  const instrs = S.instructors.map(i=>i.name);
  const minSlot = 15;

  // Build occupied windows for each room including standing classes
  function roomOccupied(room, dayName, sessions) {
    const occ = sessions.filter(s=>s.room===room).map(s=>({start:toM(s.time_start),end:toM(s.time_end)}));
    // Add standing class blocks for this room
    S.blockedTimes.filter(b=>b.day===dayName && b.assignedRoom===room).forEach(b=>{
      occ.push({start:toM(b.timeStart),end:toM(b.timeEnd)});
    });
    return occ.sort((a,b)=>a.start-b.start);
  }

  // Build occupied windows for each instructor including standing classes
  function instrOccupied(instr, dayName, sessions) {
    const occ = sessions.filter(s=>{
      const instructors = s.instructor ? s.instructor.split('/').map(x=>x.trim()) : [];
      return instructors.includes(instr);
    }).map(s=>({start:toM(s.time_start),end:toM(s.time_end)}));
    // Standing classes
    S.blockedTimes.filter(b=>b.day===dayName && b.assignedInstructor===instr).forEach(b=>{
      occ.push({start:toM(b.timeStart),end:toM(b.timeEnd)});
    });
    return occ.sort((a,b)=>a.start-b.start);
  }

  // Find free windows from an occupied list
  function freeWindows(occupied, dayOpen, dayClose) {
    const sorted = [...occupied].sort((a,b)=>a.start-b.start);
    // Merge overlapping
    const merged = [];
    sorted.forEach(o=>{
      if(merged.length && o.start<=merged[merged.length-1].end) merged[merged.length-1].end=Math.max(merged[merged.length-1].end,o.end);
      else merged.push({...o});
    });
    const gaps = [];
    let cursor = dayOpen;
    [...merged,{start:dayClose,end:dayClose}].forEach(occ=>{
      const gapLen = occ.start - cursor;
      if(gapLen >= minSlot) gaps.push({start:cursor, end:occ.start, mins:gapLen, label:fmt(cursor)+'–'+fmt(occ.start)});
      cursor = Math.max(cursor, occ.end);
    });
    return gaps;
  }

  const freeByDay = days.filter(d=>(d.sessions||[]).length).map(day=>{
    const dayOpen  = toM(S.schedParams.dayHours?.[day.day]?.open || '09:00');
    const dayClose = toM('21:45');
    const sessions = day.sessions||[];

    // Per-room free slots (excluding standing classes)
    const freeSlots = [];
    rooms.forEach(room => {
      const occ = roomOccupied(room, day.day, sessions);
      freeWindows(occ, dayOpen, dayClose).forEach(w => freeSlots.push({...w, room}));
    });

    // Per-instructor free slots
    const instrFree = {};
    instrs.forEach(instr => {
      const occ = instrOccupied(instr, day.day, sessions);
      const free = freeWindows(occ, dayOpen, dayClose);
      if(free.length) instrFree[instr] = free;
    });

    // All rooms AND all instructors free simultaneously
    const allFree = [];
    if(rooms.length && instrs.length) {
      let cur = dayOpen;
      while(cur < dayClose) {
        const allRFree = rooms.every(r => !roomOccupied(r,day.day,sessions).some(o=>o.start<cur+1&&cur<o.end));
        const allIFree = instrs.every(i => !instrOccupied(i,day.day,sessions).some(o=>o.start<cur+1&&cur<o.end));
        if(allRFree && allIFree) {
          let end=cur+1;
          while(end<dayClose
            && rooms.every(r=>!roomOccupied(r,day.day,sessions).some(o=>o.start<end+1&&end<o.end))
            && instrs.every(i=>!instrOccupied(i,day.day,sessions).some(o=>o.start<end+1&&end<o.end))
          ) end++;
          if(end-cur>=minSlot){ allFree.push({start:cur,end,mins:end-cur,label:fmt(cur)+'–'+fmt(end)}); cur=end; }
          else cur++;
        } else cur++;
      }
    }

    return { day:day.day, date:day.date, freeSlots, instrFree, allFree };
  });

  const totalFree = freeByDay.reduce((a,d)=>a+d.freeSlots.length,0);

  b.innerHTML=`

function addConstraint() {
  const instr = g('con-instr')?.value;
  const room  = g('con-room')?.value;
  if(!instr || !room) return toast('Select both an instructor and a room','err');
  if(!S.constraints) S.constraints = [];
  // Avoid duplicates
  if(S.constraints.some(c=>c.instructor===instr&&c.room===room)) return toast('Already added','err');
  S.constraints.push({ type:'instr_room_ban', instructor:instr, room });
  toast(`${instr} cannot use ${room} this weekend`,'ok');
  renderSchedParams(g('sched-body'));
}

function removeConstraint(idx) {
  if(!S.constraints) return;
  S.constraints.splice(idx, 1);

}

function showPreflightCheck() {
  const sp = S.schedParams;
  const panel = g('preflight-panel');
  if(!panel) return;

  if(!sp.startDate||!sp.endDate){ panel.style.display='block'; panel.innerHTML=`<div style="color:var(--rose);font-size:12px">Set start and end dates first.</div>`; return; }

  const toM = t=>{ const[h,m]=(t||'00:00').split(':').map(Number); return h*60+m; };
  const groups = (sp.groups||[...new Set(S.dancers.flatMap(d=>d.groups))]).filter(Boolean);

  // Build dates
  const allDates=[];
  const cur=new Date(sp.startDate+'T12:00:00');
  const endD=new Date(sp.endDate+'T12:00:00');
  while(cur<=endD){ const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][cur.getDay()]; if(sp.days.includes(dn)) allDates.push({date:cur.toISOString().slice(0,10),day:dn}); cur.setDate(cur.getDate()+1); }

  // Capacity per date
  const numRooms = Math.max(S.rooms.length,1);
  let totalCap=0;
  const dateCapacity = allDates.map(d=>{
    const hrs=sp.dayHours[d.day]||{open:'09:00',close:'21:00'};
    const isWD=!['Saturday','Sunday'].includes(d.day);
    const open=isWD?Math.max(toM(hrs.open||'09:00'),toM(sp.schoolDayStart||'16:45')):toM(hrs.open||'09:00');
    const close=toM(hrs.close||'21:00');
    const slots=numRooms*Math.floor(Math.max(0,close-open)/(sp.defaultSessLen||60)*0.7);
    totalCap+=slots;
    return {...d,slots};
  });

  // Group needs
  const groupData2 = groups.map(gr=>{
    const def=S.groups.find(x=>x.name===gr||x.id===gr)||{};
    return {group:gr,targetReh:def.targetReh||sp.rehearsalsPerGroup||1,members:S.dancers.filter(d=>d.groups.includes(gr)).length};
  });
  const totalNeeded=groupData2.reduce((s,g)=>s+g.targetReh,0);

  // Conflict density
  const conflictCount={};
  groups.forEach(g=>{conflictCount[g]=0;});
  for(let i=0;i<groups.length;i++) for(let j=i+1;j<groups.length;j++){
    const shared=S.dancers.filter(d=>d.groups.includes(groups[i])&&d.groups.includes(groups[j]));
    if(shared.length>0){conflictCount[groups[i]]++;conflictCount[groups[j]]++;}
  }
  const mostConflicted=Object.entries(conflictCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const feasible=totalCap>=totalNeeded;
  const tight=totalCap<totalNeeded*1.2;

  panel.style.display='block';
  panel.innerHTML=`
<div style="border:1px solid ${feasible?tight?'rgba(229,162,32,.4)':'rgba(82,184,114,.3)':'rgba(217,96,96,.4)'};border-radius:var(--rl);padding:14px 16px;background:var(--s2)">
  <div style="font-weight:600;font-size:13px;color:${feasible?tight?'var(--gold)':'var(--green)':'var(--rose)'};margin-bottom:10px">
    ${feasible?tight?'⚠ Feasible but tight':'✓ Looks feasible':'✗ Likely over-capacity — consider fewer groups or a longer window'}
  </div>
  <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:12px;margin-bottom:10px">
    <div><span style="color:var(--text);font-weight:600">${totalNeeded}</span> <span style="color:var(--muted)">sessions needed</span></div>
    <div><span style="color:var(--text);font-weight:600">~${totalCap}</span> <span style="color:var(--muted)">slots available (est.)</span></div>
    <div><span style="color:var(--text);font-weight:600">${allDates.length}</span> <span style="color:var(--muted)">rehearsal dates</span></div>
    <div><span style="color:var(--text);font-weight:600">${numRooms}</span> <span style="color:var(--muted)">rooms</span></div>
    <div><span style="color:var(--text);font-weight:600">${groups.length}</span> <span style="color:var(--muted)">groups</span></div>
  </div>
  ${mostConflicted.length?`<div style="font-size:11.5px;color:var(--muted);margin-bottom:6px">Most constrained groups (shared dancers with other groups):</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px">
    ${mostConflicted.map(([g,c])=>`<span style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:3px 8px;font-size:11px">
      <span style="color:var(--text)">${g}</span>
      <span style="color:${c>5?'var(--rose)':'var(--gold)'}"> ${c} conflicts</span>
    </span>`).join('')}
  </div>`:''}
  <div style="margin-top:10px;font-size:11px;color:var(--faint)">Estimate assumes 70% efficiency after blocked times. Actual capacity may vary.</div>
</div>`;
}
