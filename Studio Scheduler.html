function addTodo() {
  const inp = g('todo-input');
  const text = inp?.value?.trim();
  if(!text) return toast('Enter a note first','err');
  const todos = JSON.parse(localStorage.getItem('studio_todo_v1')||'[]');
  todos.unshift({ text, done:false, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) });
  localStorage.setItem('studio_todo_v1', JSON.stringify(todos));
  toast('Added','ok');
  renderSettings();
}
function toggleTodo(idx) {
  const todos = JSON.parse(localStorage.getItem('studio_todo_v1')||'[]');
  if(todos[idx]) todos[idx].done = !todos[idx].done;
  localStorage.setItem('studio_todo_v1', JSON.stringify(todos));
  renderSettings();
}
function removeTodo(idx) {
  const todos = JSON.parse(localStorage.getItem('studio_todo_v1')||'[]');
  todos.splice(idx,1);
  localStorage.setItem('studio_todo_v1', JSON.stringify(todos));
  renderSettings();
}
function clearDoneTodos() {
  const todos = JSON.parse(localStorage.getItem('studio_todo_v1')||'[]').filter(t=>!t.done);
  localStorage.setItem('studio_todo_v1', JSON.stringify(todos));
  renderSettings();
}

function onDrop(e){e.preventDefault();g('dz').classList.remove('over');const f=e.dataTransfer.files[0];if(f)readCSVFile(f);}
function onDragOver(e){e.preventDefault();g('dz').classList.add('over');}
function onDL(){g('dz')?.classList.remove('over');}
function loadCSV(e){readCSVFile(e.target.files[0]);}
function readCSVFile(file){
  const r=new FileReader();
  r.onload=e=>{
    try{const d=parseCSV(e.target.result);S.dancers=d;S.filter='';S.filterGroup='';S.filterStyle='';toast(`Loaded ${d.length} dancers`,'ok');renderRoster();}
    catch(err){toast('CSV error: '+err.message,'err');}
  };
  r.readAsText(file);
}
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z_]/g,''));
  const col=k=>headers.indexOf(k);
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const parts=splitLine(line);
    const get=k=>(parts[col(k)]||'').trim().replace(/^"|"$/g,'');
    const isNew = col('performance_groups')>=0 || col('affect_level')>=0 || col('first_name')>=0;
    let id,name,groups,styles;
    if(isNew){
      const fn=get('first_name'),ln=get('last_name');
      name   = fn&&ln?fn+' '+ln:fn||ln||get('name');
      id     = get('dancer_id')||'D'+Math.random().toString(36).slice(2,6);
      groups = (get('performance_groups')||get('performance_group')||'').split('|').map(g=>g.trim()).filter(Boolean);
      styles = (get('styles')||get('dance_styles')||get('dance_types')||'').split('|').map(s=>s.trim()).filter(Boolean);
    } else {
      name   = get('name');
      id     = get('dancer_id')||'D'+Math.random().toString(36).slice(2,6);
      groups = (get('performance_group')||'').split('|').map(g=>g.trim()).filter(Boolean);
      styles = (get('dance_styles')||get('dance_types')||'').split('|').map(s=>s.trim()).filter(Boolean);
    }
    return {
      id, name, groups, styles,
      tier:            get('tier')||'',
      affect_level:    get('affect_level')||'',
      prepro_level:    get('prepro_level')||'',
      pointe_level:    get('pointe_level')||'',
      tap_level:       get('tap_level')||'',
      all_levels:      get('all_levels_summary')||get('all_levels')||'',
      is_competing:    get('is_competing')||'Y',
      group_count:     parseInt(get('group_count'))||groups.length,
      understudy:      (get('understudy_groups')||'').split('|').map(g=>g.trim()).filter(Boolean),
      weekly_req_hours:parseFloat(get('weekly_req_hours'))||0,
      required_schedule:get('required_schedule')||'',
      addon_options:   get('addon_options')||'',
      complexity:      get('schedule_complexity')||'low',
      age:             parseInt(get('age'))||0,
      sl:              get('skill_level')||'',
      sibGroup:        get('sibling_group')||null,
      school:          get('school')||'',
      schoolLevel:     get('school_level')||'',
      dismissalOverrides: (()=>{
        const raw = get('dismissal_overrides')||'';
        return raw ? raw.split('|').map(chunk=>{
          const [day, time] = chunk.split(':');
          return time === 'off' ? {day, time:'', offSchool:true} : {day, time: time||'', offSchool:false};
        }).filter(o=>o.day) : [];
      })(),
    };
  }).filter(d=>d.name);
}
function splitLine(line){
  const res=[];let cur='',inQ=false;
  for(const c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){res.push(cur);cur='';}else cur+=c;}
  res.push(cur);return res;
}
function exportCSV(){
  if(!S.dancers.length)return toast('No dancers','err');
  const rows=[
    'dancer_id,first_name,last_name,age,tier,affect_level,prepro_level,pointe_level,tap_level,all_levels_summary,dance_styles,is_competing,weekly_req_hours,performance_groups,understudy_groups,school_level,dismissal_overrides',
    ...S.dancers.map(d=>{
      const parts=d.name.split(' ');

// ── Shared export helpers ──────────────────────────────────────────────────
function _xls_helpers() {
  const toM = t=>{const[h,m]=(t||'0:00').split(':').map(Number);return h*60+m;};
  const fmt12 = t=>{if(!t)return '';const[h,m]=t.split(':').map(Number);const ap=h>=12?'pm':'am';return(h%12||12)+(m?':'+String(m).padStart(2,'0'):'')+ap;};
  const fmtM = m=>fmt12(String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'));
  const getDancers = g=>S.dancers.filter(d=>d.groups&&d.groups.includes(g)).map(d=>(d.name||((d.first_name||'')+(d.last_name?' '+d.last_name:''))).trim()).filter(Boolean);
  const SCBG={Ballet:'#B8D9F0',Contemp:'#D5C0F0',Modern:'#FFE08A',Affect:'#FFB3B3',Tap:'#A8EDBC','Jazz':'#FFD4A0','Jazz Funk':'#FFADD1',Pointe:'#D4B3F5'};
  const SCFG={Ballet:'#0D3B5E',Contemp:'#3A0E6B',Modern:'#5C3A00',Affect:'#6B0F0F',Tap:'#0B4020','Jazz':'#5C2800','Jazz Funk':'#5C001E',Pointe:'#3D0060'};
  const SCAC={Ballet:'#1A6FA5',Contemp:'#6B3FA0',Modern:'#C07800',Affect:'#C0282B',Tap:'#1A8040','Jazz':'#C05A00','Jazz Funk':'#C0204A',Pointe:'#8030B0'};
  const sbg=s=>SCBG[s]||'#C8DCF5', sfg=s=>SCFG[s]||'#1A2D4E', sacc=s=>SCAC[s]||'#3A5FA0';
  const xlsHead = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><style>
    body{font-family:Calibri,Arial,sans-serif;font-size:9pt;}table{border-collapse:collapse;}
    td{padding:2px 5px;vertical-align:top;font-size:9pt;}
    .title{background:#1B3D7B;color:#FFF;font-size:13pt;font-weight:bold;text-align:center;padding:8px;}
    .sub{background:#162D5A;color:#AAB;font-size:8pt;text-align:center;padding:3px;}
    .gold{background:#E5A220;height:4px;font-size:1pt;}
    .rh{background:#1B3D7B;color:#FFF;font-weight:bold;font-size:10pt;text-align:center;padding:5px;}
    .th{background:#0D2647;color:#FFF;font-weight:bold;font-size:9pt;text-align:center;}
    .th2{background:#2C4770;color:#FFF;font-weight:bold;text-align:center;padding:4px;}
    .thr{background:#D6E8F8;color:#1B3D7B;font-weight:bold;font-size:8pt;text-align:right;border-top:2px solid #99BBDD;}
    .thh{background:#E8F2FC;color:#557;font-size:7pt;text-align:right;border-top:1px solid #CCE;}
    .tq{background:#F4F8FE;color:#AAC;font-size:7pt;text-align:right;}
  </style></head><body>`;
  const getStyle = s => {
    if(s.style) return s.style;
    const grp = S.groups.find(g=>g.id===s.group||g.name===s.group);
    return (grp?.styles||[])[0]||'';
  };
  return {toM,fmt12,fmtM,getDancers,sbg,sfg,sacc,xlsHead,getStyle};
}

function dlXls(name, html) {
  dl(name, html, 'application/vnd.ms-excel');

}

// ── 1. Day Grid schedules — one download per active day ───────────────────
function exportDaySchedules() {
  if(!S.schedule) return toast('No schedule','err');
  const {toM,fmt12,fmtM,getDancers,sbg,sfg,sacc,xlsHead,getStyle} = _xls_helpers();
  const ROOM_ORDER=['Balanchine','Ailey','Tallchief','Fosse','Graham','DeMille','Slyde'];
  const BLOCK=15, ROW_H=18;
  const allDays=S.schedule.schedule||[];
  const sessionsByDay={};
  allDays.forEach(day=>(day.sessions||[]).forEach(s=>{
    (sessionsByDay[day.day]=sessionsByDay[day.day]||[]).push({...s,_date:day.date});
  }));

  let count=0;
  Object.entries(sessionsByDay).forEach(([dayName,sess])=>{
    if(!sess.length) return;
    const dayObj=allDays.find(d=>d.day===dayName);
    const dateStr=dayObj?.date?new Date(dayObj.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase():dayName.toUpperCase();
    const activeRooms=[...new Set(sess.map(s=>s.room).filter(Boolean))].sort((a,b)=>{const ai=ROOM_ORDER.indexOf(a),bi=ROOM_ORDER.indexOf(b);return(ai===-1?99:ai)-(bi===-1?99:bi);});
    if(!activeRooms.length) return;

    const dayOpen=Math.floor(toM(S.schedParams.dayHours?.[dayName]?.open||'09:00')/BLOCK)*BLOCK;
    const dayClose=Math.ceil(toM('21:45')/BLOCK)*BLOCK;
    const totalBlocks=(dayClose-dayOpen)/BLOCK;
    const COLS=activeRooms.length+1;
    const byRoom={};
    activeRooms.forEach(rm=>{byRoom[rm]=sess.filter(s=>s.room===rm);});

    let html=xlsHead+`<table style="width:100%;table-layout:fixed">
<tr><td colspan="${COLS}" class="gold"></td></tr>
<tr><td colspan="${COLS}" class="title">STUDIO - ${dateStr}</td></tr>
<tr><td colspan="${COLS}" class="sub">${activeRooms.length} studios  ${sess.length} sessions  ${fmtM(dayOpen)} - ${fmtM(dayClose)}</td></tr>
<tr><td colspan="${COLS}" class="gold"></td></tr>
<tr><td class="th" style="width:70px">TIME</td>${activeRooms.map(rm=>`<td class="rh">${rm.toUpperCase()}</td>`).join('')}</tr>\n`;

    const claimed={};
    for(let bi=0;bi<totalBlocks;bi++){
      const mins=dayOpen+bi*BLOCK;
      const isHour=mins%60===0, isHalf=mins%30===0;
      const lbl=isHour?fmtM(mins):isHalf?'   '+fmtM(mins):'';
      const tc=isHour?'thr':isHalf?'thh':'tq';
      html+=`<tr style="height:${ROW_H}px"><td class="${tc}" style="border-right:2px solid #99BBDD">${lbl}</td>`;
      activeRooms.forEach(rm=>{
        const key=rm+'|'+bi;
        if(claimed[key]){html+=''; return;}
        const s=byRoom[rm]?.find(x=>toM(x.time_start)<=mins&&toM(x.time_end)>mins);
        if(s&&toM(s.time_start)===mins){
          const span=Math.min(Math.ceil((toM(s.time_end)-toM(s.time_start))/BLOCK),totalBlocks-bi);
          const dur=toM(s.time_end)-toM(s.time_start);
          for(let r2=1;r2<span;r2++) claimed[rm+'|'+(bi+r2)]=true;
          const _sty=getStyle(s); const bg=sbg(_sty),fg=sfg(_sty),ac=sacc(_sty);
          const dancers=getDancers(s.group);
          const grp=(s.group||'').replace(/_/g,' ');
          let txt=`<b style="font-size:10pt">${grp}</b>`;
          if(dur>=30&&s.instructor) txt+=`<br><span style="color:#555">${s.instructor}</span>`;
          if(dur>=30&&s.dancer_count) txt+=`<br><span style="color:#777">${s.dancer_count} dancers</span>`;
          if(dur>=45&&dancers.length) txt+=`<br><span style="font-size:8pt;color:${ac}">${dancers.join(', ')}</span>`;
          html+=`<td rowspan="${span}" style="background:${bg};color:${fg};border-left:4px solid ${ac};border-top:2px solid ${ac};border-bottom:2px solid ${ac};border-right:1px solid #AACCEE;padding:3px 5px;white-space:normal">${txt}</td>`;
        } else if(!s){
          html+=`<td style="background:${bi%2===0?'#FFFFFF':'#F0F6FF'};border:1px solid #E8EEF6"></td>`;
        }
      });
      html+=`</tr>\n`;
    }
    html+=`<tr><td colspan="${COLS}" class="gold"></td></tr></table></body></html>`;
    const fname=(dayName+(dayObj?.date?'_'+dayObj.date:'')).replace(/\s/g,'_')+'.xls';
    setTimeout(()=>dlXls(fname,html), count*300);
    count++;
  });
}

  allSessFlat.forEach(s=>{
    (s.instructor||'TBD').split('/').map(x=>x.trim()).forEach(name=>{
      if(!byInstr[name]) byInstr[name]=[];
      byInstr[name].push(s);
    });
  });
  // Also include standing class times
  S.blockedTimes.forEach(b=>{
    if(!b.assignedInstructor) return;
    const name=b.assignedInstructor;
    if(!byInstr[name]) byInstr[name]=[];
    byInstr[name].push({...b, _day:b.day, _date:'', time_start:b.timeStart, time_end:b.timeEnd, group:b.label+' ★', room:b.assignedRoom||'', _isClass:true});
  });

  const instrs=Object.entries(byInstr).filter(([,sess])=>sess.length).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!instrs.length) return toast('No instructor sessions found','err');

  const COLS=5;
  let html=xlsHead+`<table style="width:100%;table-layout:fixed">
<tr><td colspan="${COLS}" class="gold"></td></tr>
<tr><td colspan="${COLS}" class="title">INSTRUCTOR SCHEDULES</td></tr>
<tr><td colspan="${COLS}" class="sub">All rehearsals and standing classes per instructor</td></tr>
<tr><td colspan="${COLS}" class="gold"></td></tr>\n`;

  instrs.forEach(([name, sessions], ii)=>{
    const sorted=[...sessions].sort((a,b)=>{
      const di=DAY_ORDER.indexOf(a._day)-DAY_ORDER.indexOf(b._day);
      return di!==0?di:toM(a.time_start)-toM(b.time_start);
    });
    const totalMins=sorted.filter(s=>!s._isClass).reduce((acc,s)=>acc+Math.max(0,toM(s.time_end)-toM(s.time_start)),0);
    const instr=S.instructors.find(i=>i.name===name);
    const instrStyles=instr?.styles?.join(', ')||'';

    // Instructor header
    const hdrBg=ii%2===0?'#1B3D7B':'#2C4770';
    html+=`<tr><td colspan="${COLS}" style="background:${hdrBg};color:#FFF;font-weight:bold;font-size:12pt;padding:8px;border-top:3px solid #E5A220">${name.toUpperCase()}</td></tr>\n`;
    html+=`<tr><td colspan="${COLS}" style="background:#162D5A;color:#AAB;font-size:8pt;padding:3px 8px">${instrStyles?instrStyles+' · ':''}${sorted.filter(s=>!s._isClass).length} rehearsals · ${(totalMins/60).toFixed(1)} hrs</td></tr>\n`;
    html+=`<tr>
      <td class="th2" style="width:12%">DAY</td>
      <td class="th2" style="width:16%">TIME</td>
      <td class="th2" style="width:32%">GROUP / CLASS</td>
      <td class="th2" style="width:20%">ROOM</td>
      <td class="th2">TYPE</td>
    </tr>\n`;

    sorted.forEach((s,si)=>{
      const rb=si%2===0?'#EEF4FF':'#FFFFFF';
      const isClass=s._isClass||false;
      const rowBg=isClass?'#FFFBE6':rb;
      const dateNote=s._date?` (${new Date(s._date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})})`: '';
      html+=`<tr>
        <td style="background:${rowBg};font-weight:600;color:#1B3D7B">${s._day}${dateNote}</td>
        <td style="background:${rowBg};text-align:center;font-family:monospace">${fmt12(s.time_start)}–${fmt12(s.time_end)}</td>
        <td style="background:${rowBg};font-weight:${isClass?'normal':'bold'};color:${isClass?'#664':'#1B3D7B'}">${(s.group||'').replace(/_/g,' ')}</td>
        <td style="background:${rowBg}">${s.room||''}</td>
        <td style="background:${rowBg};color:${isClass?'#996600':'#1B3D7B'};font-size:8pt">${isClass?'Standing class':'Rehearsal'}</td>
      </tr>\n`;
    });
    // Spacer
    html+=`<tr style="height:10px"><td colspan="${COLS}" style="background:#fff"></td></tr>\n`;
  });

  html+=`<tr><td colspan="${COLS}" class="gold"></td></tr></table></body></html>`;
  dlXls('instructor_schedules.xls', html);
}

function dl(name,content,mime){
  try {
    const blob = new Blob([content],{type:mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=name; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); document.body.removeChild(a); },200);
  } catch(e) {
    // Fallback for sandboxed iframes — encode as data URI
    try {
      const encoded = typeof content === 'string'
        ? 'data:'+mime+';charset=utf-8,'+encodeURIComponent(content)
        : 'data:'+mime+';base64,'+btoa(String.fromCharCode(...new Uint8Array(content)));
      const a = document.createElement('a');
      a.href=encoded; a.download=name; a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(()=>document.body.removeChild(a),200);
    } catch(e2) {
      toast('Download failed: '+e2.message+' — try right-click > Save As','err');
      console.error('dl error:', e2);
    }
  }
}

// ═══════════════════════════════════════════════════════
// PERSISTENCE — rooms and instructors are static, save/load from localStorage
// ═══════════════════════════════════════════════════════
const PERSIST_KEY = 'studio_scheduler_static_v1';

function persistStatic() {
  try {
    const assignments = S.groups.map(g=>({
      id:g.id, name:g.name,
      assignedInstructor:  g.assignedInstructor||'',
      assignedInstructor2: g.assignedInstructor2||'',
      instr2Logic:         g.instr2Logic||'AND',
      category:            g.category||'competition',
      assignedRoom:        g.assignedRoom||'',
      assignedDay:         g.assignedDay||'',
      assignedTimeStart:   g.assignedTimeStart||'',
      assignedTimeEnd:     g.assignedTimeEnd||'',
      allowedDays:         g.allowedDays||[],
      type:                g.type||'',
      sessLenMin:          g.sessLenMin||0,
      sessLenMax:          g.sessLenMax||0,
      status:              g.status||'active',
      internalNotes:       g.internalNotes||'',
      variationTier:       g.variationTier||'',
      styles:              g.styles||[],
      scene:               g.scene||'',
    }));
    // Keep in-memory snapshot current so applyGroupAssignments always has fresh data
    // after a CSV re-import (not just at boot)
    S._savedGroupAssignments = assignments;
    const data = {
      rooms:            S.rooms,
      instructors:      S.instructors,
      groupAssignments: assignments,
      schedParams: {
        schoolDayStart: S.schedParams.schoolDayStart,
        defaultSessLen: S.schedParams.defaultSessLen,
        dayHours:       S.schedParams.dayHours,
        days:           S.schedParams.days,
      },
      schoolDismissalTimes: S.schoolDismissalTimes,
      variationTierTimes:   S.variationTierTimes,
      skillLevelDaysOff:    S.skillLevelDaysOff,
    };
    localStorage.setItem(PERSIST_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Could not persist:', e); }
}

function loadStatic() {
  try {
    const raw = localStorage.getItem(PERSIST_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    // Only restore rooms/instructors if they were actually saved (don't wipe built-ins)
    if(data.rooms?.length)       { S.rooms = data.rooms; }
    if(data.instructors?.length) { S.instructors = data.instructors; }
    if(data.schedParams) {
      Object.assign(S.schedParams, data.schedParams);
    }
    if(data.schoolDismissalTimes) {
      Object.assign(S.schoolDismissalTimes, data.schoolDismissalTimes);
    }
    if(data.variationTierTimes) {
      Object.assign(S.variationTierTimes, data.variationTierTimes);
    }
    if(data.skillLevelDaysOff) {
      Object.assign(S.skillLevelDaysOff, data.skillLevelDaysOff);
    }
    // Re-apply group assignments after groups are loaded
    if(data.groupAssignments?.length) {
      S._savedGroupAssignments = data.groupAssignments;
    }
    return true;
  } catch(e) { console.warn('Could not load persisted data:', e); return false; }
}

function applyGroupAssignments() {
  // Called after groups are imported — re-applies all saved per-group assignments
  if(!S._savedGroupAssignments?.length) return;
  const normalize = s => (s||'').toLowerCase().replace(/[-_\s]+/g, '_');
  let applied = 0;
  S._savedGroupAssignments.forEach(saved => {
    const gr = S.groups.find(g => g.id===saved.id || g.name===saved.name)
      || S.groups.find(g => normalize(g.id)===normalize(saved.id) || normalize(g.name)===normalize(saved.name));
    if(gr) {
      if(saved.assignedInstructor)  gr.assignedInstructor  = saved.assignedInstructor;
      if(saved.assignedInstructor2) gr.assignedInstructor2 = saved.assignedInstructor2;
      if(saved.category)  gr.category  = saved.category;
      if(saved.instr2Logic)  gr.instr2Logic  = saved.instr2Logic;
      if(saved.assignedRoom)        gr.assignedRoom        = saved.assignedRoom;
      if(saved.assignedDay)         gr.assignedDay         = saved.assignedDay;
      if(saved.assignedTimeStart)   gr.assignedTimeStart   = saved.assignedTimeStart;
      if(saved.assignedTimeEnd)     gr.assignedTimeEnd     = saved.assignedTimeEnd;
      if(saved.allowedDays?.length) gr.allowedDays         = saved.allowedDays;
      if(saved.type)                gr.type                = saved.type;
      if(saved.sessLenMin)          gr.sessLenMin          = saved.sessLenMin;
      if(saved.sessLenMax)          gr.sessLenMax          = saved.sessLenMax;
      if(saved.status)              gr.status              = saved.status;
      if(saved.internalNotes)       gr.internalNotes       = saved.internalNotes;
      if(saved.variationTier)       gr.variationTier       = saved.variationTier;
      if(saved.styles?.length)      gr.styles              = saved.styles;
      if(saved.scene !== undefined)  gr.scene               = saved.scene;
      applied++;
    }
  });
  if(applied) toast(`Restored assignments for ${applied} group(s)`, 'ok');
}

function patchPersistence() {
  const origSaveRoom = window.saveRoom;
  window.saveRoom = function(id) { origSaveRoom(id); persistStatic(); };
  const origDeleteRoom = window.deleteRoom;
  window.deleteRoom = function(id) { origDeleteRoom(id); persistStatic(); };
  const origSaveInstr = window.saveInstr;
  window.saveInstr = function(id) { origSaveInstr(id); persistStatic(); };
  const origDeleteInstr = window.deleteInstr;
  window.deleteInstr = function(id) { origDeleteInstr(id); persistStatic(); };
  const origSaveGroup = window.saveGroup;
  window.saveGroup = function(id) { origSaveGroup(id); persistStatic(); };
}

// Hook importGroupsCSV to apply saved assignments after loading — patched at boot
function _applyAssignmentsAfterImport() {
  setTimeout(applyGroupAssignments, 300);
}
